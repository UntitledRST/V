<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>빌드 배포 대시보드</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700;800&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #0B0D12;
    --panel: #14171F;
    --panel-2: #191D26;
    --border: #262B36;
    --border-soft: #1E222C;
    --text-primary: #E7E9EE;
    --text-secondary: #9AA3B2;
    --text-muted: #5C6474;
    --alpha: #3DD6C4;
    --alpha-dim: #1B4A45;
    --beta: #F2A93B;
    --beta-dim: #4A3A17;
    --app-color: #59C7F7;
    --app-border: #1E3A4A;
    --web-color: #C08BFA;
    --web-border: #3A2A4E;
    --ok: #4ADE80;
    --err: #F87171;
    --pending: #6B7280;
    --font-sans: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    --font-mono: 'JetBrains Mono', 'SFMono-Regular', Consolas, monospace;
  }

  *{ box-sizing: border-box; margin:0; padding:0; }

  html, body{ height: 100%; }

  body{
    background: var(--bg);
    color: var(--text-primary);
    font-family: var(--font-sans);
    padding: 20px 22px 16px;F
    overflow: hidden;
  }

  @media (max-width: 900px){
    body{ overflow-y: auto; height: auto; padding: 20px 16px 60px; }
  }

  .wrap{
    max-width: 1400px;
    margin: 0 auto;
    height: 100%;
    display: flex;
    flex-direction: column;
  }

  header{
    display:flex;
    align-items:flex-start;
    justify-content:space-between;
    gap: 24px;
    margin-bottom: 18px;
    flex-wrap: wrap;
  }

  .title-block h1{
    font-size: 21px;
    font-weight: 800;
    letter-spacing: -0.02em;
    margin-bottom: 4px;
  }
  .title-block p{
    font-size: 12.5px;
    color: var(--text-secondary);
  }
  .title-block .dot{
    display:inline-block;
    width:6px; height:6px;
    border-radius:50%;
    background: var(--alpha);
    margin-right: 4px;
    vertical-align: 1px;
  }

  .header-right{
    display:flex;
    align-items:center;
    gap:10px;
    flex-wrap: wrap;
  }

  #last-sync{
    font-family: var(--font-mono);
    font-size: 13.5px;
    color: var(--text-muted);
  }

  #auto-refresh-select{
    background: var(--panel);
    border: 1px solid var(--border);
    color: var(--text-primary);
    font-family: var(--font-sans);
    font-size: 12.5px;
    font-weight: 600;
    padding: 8px 10px;
    border-radius: 8px;
    cursor: pointer;
  }

  #refresh-btn{
    display:flex;
    align-items:center;
    gap:8px;
    background: var(--panel);
    border: 1px solid var(--border);
    color: var(--text-primary);
    font-family: var(--font-sans);
    font-size: 13px;
    font-weight: 700;
    padding: 9px 16px;
    border-radius: 8px;
    cursor: pointer;
    transition: border-color .15s ease, background .15s ease;
  }
  #refresh-btn:hover{
    border-color: var(--border-soft);
    background: var(--panel-2);
  }
  #refresh-btn:active{ transform: scale(0.98); }
  #refresh-btn.spinning svg{ animation: spin 0.8s linear infinite; }
  #refresh-btn:disabled{ opacity: 0.6; cursor: default; }

  @keyframes spin{ to{ transform: rotate(360deg); } }

  .channels{
    display:flex;
    flex-direction: column;
    gap: 14px;
    flex: 1;
    min-height: 0;
  }

  .channel-section{
    display:flex;
    flex-direction: column;
    gap: 8px;
  }

  .channel-heading{
    display:flex;
    align-items:center;
    gap:10px;
  }

  .channel-badge{
    font-family: var(--font-mono);
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    padding: 3px 9px;
    border-radius: 5px;
    border: 1px solid;
  }
  .channel-badge.alpha{
    color: var(--alpha);
    border-color: var(--alpha-dim);
    background: rgba(61,214,196,0.08);
  }
  .channel-badge.beta{
    color: var(--beta);
    border-color: var(--beta-dim);
    background: rgba(242,169,59,0.08);
  }

  .channel-heading h2{
    font-size: 14px;
    font-weight: 700;
    color: var(--text-secondary);
  }

  .channel-row{
    display:flex;
    gap: 14px;
    flex: 1;
    min-height: 0;
  }

  .subsection{
    border-radius: 12px;
    border: 1px solid var(--border);
    padding: 12px;
    display:flex;
    flex-direction: column;
    gap: 8px;
    min-width: 0;
  }
  .subsection.app{
    flex: 2;
    border-color: var(--app-border);
    background: rgba(89,199,247,0.03);
  }
  .subsection.web{
    flex: 1;
    border-color: var(--web-border);
    background: rgba(192,139,250,0.03);
  }

  .subsection-header{
    font-size: 16px;
    font-weight: 800;
    letter-spacing: 0.01em;
    padding: 0 2px;
  }
  .subsection-header.app{ color: var(--app-color); }
  .subsection-header.web{ color: var(--web-color); }

  .card-grid{
    display: grid;
    gap: 10px;
    flex: 1;
    min-height: 0;
  }
  .card-grid.app-grid{ grid-template-columns: repeat(4, 1fr); }
  .card-grid.web-grid{ grid-template-columns: repeat(2, 1fr); }

  @media (max-width: 900px){
    .channel-row{ flex-direction: column; }
    .card-grid.app-grid{ grid-template-columns: repeat(2, 1fr); }
    .card-grid.web-grid{ grid-template-columns: repeat(2, 1fr); }
  }
  @media (max-width: 520px){
    .card-grid.app-grid{ grid-template-columns: 1fr; }
    .card-grid.web-grid{ grid-template-columns: 1fr; }
  }

  .card{
    background: var(--panel);
    border: 2px solid var(--border);
    border-radius: 10px;
    padding: 12px 12px 10px;
    display:flex;
    flex-direction:column;
    align-items: center;
    text-align: center;
    gap: 8px;
    position: relative;
    min-height: 0;
    transition: border-color .3s ease;
  }

  .card.flash{
    animation: flash-border 1s ease-in-out infinite;
  }
  @keyframes flash-border{
    0%, 100%{ border-color: var(--err); box-shadow: 0 0 0 1px rgba(248,113,113,0.35); }
    50%{ border-color: var(--border); box-shadow: none; }
  }

  .card-top{
    display:flex;
    align-items:center;
    justify-content:space-between;
    width: 100%;
  }

  .platform-label{
    display:flex;
    align-items:center;
    gap:7px;
    font-size: 13px;
    font-weight: 700;
    color: var(--text-secondary);
  }

  .platform-icon{
    width: 17px;
    height: 17px;
    flex-shrink:0;
    stroke: var(--text-secondary);
  }

  .status-dot{
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--pending);
    flex-shrink: 0;
  }
  .status-dot.ok{ background: var(--ok); }
  .status-dot.err{ background: var(--err); }
  .status-dot.loading{
    background: var(--text-muted);
    animation: pulse 1s ease-in-out infinite;
  }
  @keyframes pulse{
    0%,100%{ opacity: 1; }
    50%{ opacity: 0.3; }
  }

  .build-center{
    display:flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
    flex: 1;
    justify-content: center;
    width: 100%;
  }

  .build-number{
    font-family: var(--font-mono);
    font-size: 34px;
    font-weight: 800;
    line-height: 1.05;
    letter-spacing: -0.01em;
  }
  .build-label{
    font-size: 11.5px;
    font-weight: 700;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }

  .updated-time{
    font-family: var(--font-mono);
    font-size: 13.5px;
    color: var(--text-secondary);
    margin-top: 2px;
    word-break: break-word;
  }

  .version-text{
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--text-muted);
  }

  .error-msg{
    font-size: 12px;
    color: var(--err);
    line-height: 1.5;
  }

  .download-btn{
    display:flex;
    align-items:center;
    justify-content:center;
    gap: 7px;
    width: 100%;
    text-decoration: none;
    font-size: 12.5px;
    font-weight: 700;
    padding: 8px 10px;
    border-radius: 7px;
    border: 1px solid var(--border);
    color: var(--text-primary);
    background: var(--panel-2);
    transition: border-color .15s ease, background .15s ease;
  }
  .download-btn:hover{
    border-color: var(--alpha-dim);
    background: rgba(61,214,196,0.06);
  }
  .download-btn.disabled{
    opacity: 0.45;
    pointer-events: none;
  }
  .download-btn svg{ width: 14px; height: 14px; }

  .skeleton{
    height: 34px;
    width: 60%;
    border-radius: 6px;
    background: linear-gradient(90deg, var(--panel-2) 25%, var(--border-soft) 37%, var(--panel-2) 63%);
    background-size: 400% 100%;
    animation: shimmer 1.4s ease infinite;
  }
  @keyframes shimmer{
    0%{ background-position: 100% 50%; }
    100%{ background-position: 0 50%; }
  }
</style>
</head>
<body>
<div class="wrap">

  <header>
    <div class="title-block">
      <h1><span class="dot"></span>빌드 배포 대시보드</h1>
      <p>Alpha / Beta 채널 · App(Windows·macOS·Android·iOS) · Web(Viewer·Relay)</p>
    </div>
    <div class="header-right">
      <span id="last-sync">불러오는 중…</span>
      <select id="auto-refresh-select" title="자동 새로고침 간격">
        <option value="0">자동 새로고침: 끄기</option>
        <option value="10">10초마다</option>
        <option value="20">20초마다</option>
        <option value="30">30초마다</option>
        <option value="40">40초마다</option>
        <option value="50">50초마다</option>
        <option value="60">60초마다</option>
      </select>
      <button id="refresh-btn" onclick="refreshAll()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 12a9 9 0 1 1-2.64-6.36"/>
          <path d="M21 3v6h-6"/>
        </svg>
        새로고침
      </button>
    </div>
  </header>

  <div class="channels">
    <section class="channel-section" id="section-alpha">
      <div class="channel-heading">
        <span class="channel-badge alpha">Alpha</span>
        <h2>알파 채널</h2>
      </div>
      <div class="channel-row">
        <div class="subsection app">
          <div class="subsection-header app">App</div>
          <div class="card-grid app-grid" id="alpha-app-grid"></div>
        </div>
        <div class="subsection web">
          <div class="subsection-header web">Web</div>
          <div class="card-grid web-grid" id="alpha-web-grid"></div>
        </div>
      </div>
    </section>

    <section class="channel-section" id="section-beta">
      <div class="channel-heading">
        <span class="channel-badge beta">Beta</span>
        <h2>베타 채널</h2>
      </div>
      <div class="channel-row">
        <div class="subsection app">
          <div class="subsection-header app">App</div>
          <div class="card-grid app-grid" id="beta-app-grid"></div>
        </div>
        <div class="subsection web">
          <div class="subsection-header web">Web</div>
          <div class="card-grid web-grid" id="beta-web-grid"></div>
        </div>
      </div>
    </section>
  </div>

</div>

<script>
const ICONS = {
  windows: '<svg class="platform-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 5.5 10.5 4.4V11.3H3V5.5Z"/><path d="M11.5 4.3 21 3v8.2h-9.5V4.3Z"/><path d="M3 12.3h7.5v6.9L3 18.1v-5.8Z"/><path d="M11.5 12.3H21V21l-9.5-1.3v-7.4Z"/></svg>',
  macos: '<svg class="platform-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16.7 12.3c0-2 1.6-3 1.7-3.1-1-1.4-2.5-1.6-3-1.6-1.3-.1-2.5.7-3.1.7-.6 0-1.6-.7-2.7-.7-1.4 0-2.6.8-3.3 2-1.4 2.5-.4 6.1 1 8.1.7 1 1.5 2.1 2.5 2 1-.1 1.4-.6 2.6-.6 1.2 0 1.6.6 2.7.6 1.1 0 1.8-1 2.5-2 .8-1.1 1.1-2.2 1.1-2.3-.1 0-2-.8-2-3.1Z"/><path d="M14.5 5.8c.6-.7 1-1.7.9-2.7-.9.1-1.9.6-2.5 1.3-.5.6-1 1.6-.9 2.6 1 .1 1.9-.5 2.5-1.2Z"/></svg>',
  android: '<svg class="platform-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 9v7a1 1 0 0 0 1 1h10a1 1 0 0 0 1-1V9"/><path d="M4.5 9v5.5"/><path d="M19.5 9v5.5"/><path d="M9 20l.7-2"/><path d="M15 20l-.7-2"/><path d="M8 9V6a4 4 0 0 1 8 0v3"/><path d="M6 9h12"/><path d="M9.5 5.2 8.3 3.4"/><path d="M14.5 5.2 15.7 3.4"/></svg>',
  ios: '<svg class="platform-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="7" y="2" width="10" height="20" rx="2"/><line x1="11" y1="18" x2="13" y2="18"/></svg>',
  viewer: '<svg class="platform-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="4" width="20" height="13" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>',
  host: '<svg class="platform-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="6" rx="1.5"/><rect x="3" y="14" width="18" height="6" rx="1.5"/><line x1="7" y1="7" x2="7.01" y2="7"/><line x1="7" y1="17" x2="7.01" y2="17"/></svg>'
};

const PLATFORM_LABELS = { windows: 'Windows', macos: 'macOS', android: 'Android', ios: 'iOS', viewer: 'Viewer', relay: 'Relay' };

// 프론트엔드 참고/폴백용 설정 (다운로드 링크가 API 응답에 없을 때의 대체 링크로 사용)
const FRONT_CONFIG = {
  alpha: {
    app: {
      windows: { json: 'https://stapn.113366.com/pub/windows/version.json' },
      macos:   { json: 'https://stapn.113366.com/pub/macos/version.json' },
      android: { json: 'https://stapn.113366.com/pub/android/version.json' },
      ios:     { json: 'https://stapn.113366.com/pub/ios/version.json' }
    },
    web: {
      viewer: { page: 'https://stapn.startsupport.com' },
      relay:   { json: 'https://stapn.113366.com/version.json' }
    }
  },
  beta: {
    app: {
      windows: { json: 'https://stbtn.113366.com/pub/windows/version.json' },
      macos:   { json: 'https://stbtn.113366.com/pub/macos/version.json' },
      android: { json: 'https://stbtn.113366.com/pub/android/version.json' },
      ios:     { json: 'https://stbtn.113366.com/pub/ios/version.json' }
    },
    web: {
      viewer: { page: 'https://stbtn.startsupport.com' },
      relay:   { json: 'https://stbtn.113366.com/version.json' }
    }
  }
};

const CHANNELS = ['alpha', 'beta'];
const SECTIONS = ['app', 'web'];

function cardId(channel, section, key){
  return `card-${channel}-${section}-${key}`;
}

function renderSkeletonCard(channel, section, key){
  const id = cardId(channel, section, key);
  const label = PLATFORM_LABELS[key];
  const icon = ICONS[key];
  return `
    <div class="card" id="${id}">
      <div class="card-top">
        <span class="platform-label">${icon}${label}</span>
        <span class="status-dot loading" id="${id}-dot"></span>
      </div>
      <div class="build-center" id="${id}-center">
        <div class="skeleton"></div>
      </div>
      <a class="download-btn disabled" id="${id}-dl" href="#">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3v12"/><path d="m7 10 5 5 5-5"/><path d="M5 21h14"/></svg>
        <span id="${id}-dl-label">다운로드</span>
      </a>
    </div>
  `;
}

function initGrids(){
  for(const channel of CHANNELS){
    for(const section of SECTIONS){
      const grid = document.getElementById(`${channel}-${section}-grid`);
      const keys = Object.keys(FRONT_CONFIG[channel][section]);
      grid.innerHTML = keys.map(k => renderSkeletonCard(channel, section, k)).join('');
    }
  }
}

function pad(n){ return String(n).padStart(2, '0'); }

// 업데이트 날짜시간: yyyy-mm-dd hh:mm:ss 형식
function formatDateTime(iso){
  if(!iso) return null;
  const d = new Date(iso);
  if(isNaN(d.getTime())) return null;
  return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`;
}

// Date 파싱이 안 되는 원문에서 yyyy-mm-dd 와 hh:mm:ss 패턴을 직접 추출해 조합
function extractDateTimePattern(s){
  const dateMatch = s.match(/(\d{4})[-./](\d{1,2})[-./](\d{1,2})/);
  const timeMatch = s.match(/([01]?\d|2[0-3]):([0-5]\d):([0-5]\d)/);
  if(dateMatch && timeMatch){
    return `${dateMatch[1]}-${pad(Number(dateMatch[2]))}-${pad(Number(dateMatch[3]))} ${pad(Number(timeMatch[1]))}:${timeMatch[2]}:${timeMatch[3]}`;
  }
  if(dateMatch){
    return `${dateMatch[1]}-${pad(Number(dateMatch[2]))}-${pad(Number(dateMatch[3]))}`;
  }
  if(timeMatch){
    return `${pad(Number(timeMatch[1]))}:${timeMatch[2]}:${timeMatch[3]}`;
  }
  return null;
}

// KST 문구 제거 + "업데이트: yyyy-mm-dd hh:mm:ss" 형식으로 표시
function cleanUpdatedText(raw){
  if(!raw) return null;
  let s = String(raw).replace(/KST/gi, '').trim().replace(/\s+/g, ' ');
  if(!s.length) return null;
  const formatted = formatDateTime(s) || extractDateTimePattern(s);
  return `업데이트: ${formatted || s}`;
}

// "v8.0.1" 로 시작하는 버전 문구는 표시하지 않음
function sanitizeVersion(v){
  if(!v) return null;
  const s = String(v).trim();
  if(/^v?8\.0\.1/i.test(s)) return null;
  return s;
}

// ---- 업데이트 감지(테두리 깜빡임) ----
function flashKey(channel, section, key){
  return `bdash:${channel}:${section}:${key}`;
}

function checkFlash(channel, section, key, valueStr){
  const storageKey = flashKey(channel, section, key);
  const prevValue = localStorage.getItem(`${storageKey}:value`);
  const wasFlashing = localStorage.getItem(`${storageKey}:flash`) === '1';

  let flashing = false;
  if(prevValue !== null && prevValue !== valueStr){
    flashing = true; // 값이 바뀜 -> 깜빡임 시작
  } else if(prevValue === valueStr && wasFlashing){
    flashing = false; // 값이 유지됨 -> 깜빡임 해제
  } else {
    flashing = wasFlashing && prevValue === valueStr;
  }

  localStorage.setItem(`${storageKey}:value`, valueStr);
  localStorage.setItem(`${storageKey}:flash`, flashing ? '1' : '0');
  return flashing;
}

async function fetchBuilds(){
  const res = await fetch('/api/builds', { cache: 'no-store' });
  if(!res.ok) throw new Error(`HTTP ${res.status}`);
  return res.json();
}

function renderCard(channel, section, key, data){
  const id = cardId(channel, section, key);
  const card = document.getElementById(id);
  const dot = document.getElementById(`${id}-dot`);
  const center = document.getElementById(`${id}-center`);
  const dlBtn = document.getElementById(`${id}-dl`);
  const dlLabel = document.getElementById(`${id}-dl-label`);

  if(!data || data.error){
    dot.className = 'status-dot err';
    center.innerHTML = `<span class="error-msg">불러오기 실패${data && data.error ? '<br>' + data.error : ''}</span>`;
    dlBtn.classList.add('disabled');
    dlBtn.removeAttribute('target');
    card.classList.remove('flash');
    return;
  }

  dot.className = 'status-dot ok';

  const isHost = key === 'host';
  const updatedRaw = isHost ? null : cleanUpdatedText(data.updatedAt);
  const versionText = sanitizeVersion(data.version);

  center.innerHTML = `
    <span class="build-number">#${data.build ?? '-'}</span>
    <span class="build-label">현재 빌드</span>
    ${updatedRaw ? `<span class="updated-time">${updatedRaw}</span>` : ''}
    ${versionText ? `<span class="version-text">${versionText}</span>` : ''}
  `;

  const isWeb = section === 'web';
  const href = data.downloadUrl || (isWeb ? (FRONT_CONFIG[channel].web[key].page || null) : null);

  if(href){
    dlBtn.href = href;
    dlBtn.classList.remove('disabled');
    dlBtn.setAttribute('target', '_blank');
    dlBtn.setAttribute('rel', 'noopener noreferrer');
    dlLabel.textContent = isWeb ? '바로가기' : '다운로드';
  } else {
    dlBtn.classList.add('disabled');
    dlBtn.removeAttribute('target');
    dlLabel.textContent = isWeb ? '바로가기' : '다운로드';
  }

  // 업데이트 감지: build + updatedAt 조합으로 변경 여부 판단
  const valueStr = JSON.stringify({ build: data.build ?? null, updatedAt: isHost ? null : (data.updatedAt ?? null) });
  const flashing = checkFlash(channel, section, key, valueStr);
  card.classList.toggle('flash', flashing);
}

async function refreshAll(){
  const btn = document.getElementById('refresh-btn');
  const lastSync = document.getElementById('last-sync');
  btn.disabled = true;
  btn.classList.add('spinning');
  lastSync.textContent = '갱신 중…';

  try{
    const result = await fetchBuilds();

    for(const channel of CHANNELS){
      for(const section of SECTIONS){
        const keys = Object.keys(FRONT_CONFIG[channel][section]);
        for(const key of keys){
          const data = result[channel] && result[channel][section] ? result[channel][section][key] : null;
          renderCard(channel, section, key, data);
        }
      }
    }

    const now = new Date();
    lastSync.textContent = `마지막 갱신: ${now.getFullYear()}-${pad(now.getMonth()+1)}-${pad(now.getDate())} ${pad(now.getHours())}:${pad(now.getMinutes())}:${pad(now.getSeconds())}`;
  }catch(err){
    lastSync.textContent = `갱신 실패: ${err.message}`;
  }finally{
    btn.disabled = false;
    btn.classList.remove('spinning');
  }
}

// ---- 커스텀 자동 새로고침 (10초 단위, 최대 60초) ----
let autoTimer = null;
function setAutoRefresh(seconds){
  if(autoTimer){ clearInterval(autoTimer); autoTimer = null; }
  if(seconds > 0){
    autoTimer = setInterval(refreshAll, seconds * 1000);
  }
}
document.getElementById('auto-refresh-select').addEventListener('change', (e) => {
  setAutoRefresh(Number(e.target.value));
});

initGrids();
refreshAll();
</script>
