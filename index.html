<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>빌드 배포 대시보드</title>
<style>
  :root{
    --bg: #0a0d13;
    --panel-bg: #10141c;
    --card-bg: #141922;
    --border: #262d3a;
    --border-soft: #1c2230;
    --text: #eef1f6;
    --muted: #8993a6;
    --muted-2: #6b7385;
    --app-color: #4ea1ff;
    --web-color: #c98bff;
    --green: #34d399;
    --red: #ef4444;
    --alpha-bg: #0f3d36;
    --alpha-fg: #4fd8bf;
    --beta-bg: #43310f;
    --beta-fg: #f0a94e;
    --btn-bg: #1a2029;
    --btn-bg-hover: #212836;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    background: var(--bg);
    color: var(--text);
    font-family: "Pretendard", "Apple SD Gothic Neo", "Malgun Gothic", -apple-system, BlinkMacSystemFont, sans-serif;
    -webkit-font-smoothing: antialiased;
  }

  .wrap {
    max-width: 1500px;
    margin: 0 auto;
    padding: 22px 26px 40px;
  }

  /* ---------- Header ---------- */
  .top-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 16px;
    margin-bottom: 22px;
    flex-wrap: wrap;
  }

  .title-block { display:flex; flex-direction: column; gap: 6px; }

  .title-row { display:flex; align-items:center; gap:10px; }
  .title-dot {
    width: 9px; height: 9px; border-radius: 50%;
    background: var(--green);
    box-shadow: 0 0 8px var(--green);
    flex-shrink: 0;
  }
  .title-row h1 { font-size: 1.5rem; margin: 0; font-weight: 800; letter-spacing: -0.02em; }
  .subtitle { color: var(--muted); font-size: 0.85rem; }

  .header-right {
    display:flex; align-items:center; gap: 12px; flex-wrap: wrap;
  }

  .last-refresh {
    text-align: right;
    color: var(--muted);
    font-size: 1rem;
  }
  .last-refresh .value {
    color: var(--text);
    font-weight: 700;
    font-size: 1rem;
  }
  .last-refresh .label { color: var(--muted-2); font-size: 0.78rem; margin-bottom: 2px; }

  select.autorefresh {
    background: var(--btn-bg);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 14px;
    font-size: 0.9rem;
    font-weight: 600;
    cursor: pointer;
  }

  button.refresh-btn {
    display:flex; align-items:center; justify-content:center;
    gap: 6px;
    background: var(--btn-bg);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 12px;
    padding: 12px 16px;
    font-size: 0.85rem;
    font-weight: 700;
    cursor: pointer;
    transition: background .15s ease, transform .1s ease;
    white-space: nowrap;
  }
  button.refresh-btn:hover { background: var(--btn-bg-hover); }
  button.refresh-btn:active { transform: scale(0.96); }
  button.refresh-btn.spinning svg { animation: spin 0.7s linear infinite; }
  @keyframes spin { from{transform:rotate(0deg);} to{transform:rotate(360deg);} }

  /* ---------- Channel Section ---------- */
  .channel-block { margin-bottom: 26px; }

  .channel-heading {
    display:flex; align-items:center; gap: 10px;
    margin-bottom: 12px;
  }
  .badge {
    font-size: 0.72rem;
    font-weight: 800;
    letter-spacing: 0.04em;
    padding: 4px 10px;
    border-radius: 6px;
  }
  .badge.alpha { background: var(--alpha-bg); color: var(--alpha-fg); }
  .badge.beta { background: var(--beta-bg); color: var(--beta-fg); }
  .channel-heading .ko-name { font-weight: 700; color: var(--text); font-size: 1.02rem; }

  .channel-row {
    display: flex;
    gap: 16px;
    align-items: stretch;
    flex-wrap: wrap;
  }

  .panel {
    background: var(--panel-bg);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 18px;
    flex: 1 1 640px;
  }
  .panel.web-panel { flex: 0 0 auto; }

  .panel-label {
    font-weight: 800;
    font-size: 1.15rem;
    margin: 0 0 14px 4px;
    letter-spacing: -0.01em;
  }
  .panel-label.app { color: var(--app-color); }
  .panel-label.web { color: var(--web-color); }

  .cards-grid {
    display: flex;
    gap: 14px;
    flex-wrap: wrap;
  }

  /* ---------- Card ---------- */
  .card {
    position: relative;
    width: 208px;
    height: 268px;
    background: var(--card-bg);
    border: 1px solid var(--border-soft);
    border-radius: 14px;
    padding: 16px 12px 14px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    text-align: center;
    transition: border-color .2s ease;
  }
  .card.updated-today {
    border-color: var(--red);
    box-shadow: 0 0 0 1px var(--red) inset;
  }

  .update-badge {
    position: absolute;
    top: 8px;
    right: 8px;
    background: var(--red);
    color: #fff;
    font-size: 0.72rem;
    font-weight: 800;
    padding: 2px 7px;
    border-radius: 999px;
    line-height: 1.4;
  }

  .card-head {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 7px;
    width: 100%;
    margin-bottom: 14px;
  }
  .icon-badge {
    width: 20px; height: 20px;
    border-radius: 6px;
    background: #232a38;
    color: var(--text);
    font-size: 0.68rem;
    font-weight: 800;
    display:flex; align-items:center; justify-content:center;
    flex-shrink: 0;
  }
  .card-name { font-weight: 700; font-size: 0.95rem; }
  .status-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--green);
    box-shadow: 0 0 6px var(--green);
    flex-shrink: 0;
  }

  .build-number {
    font-size: 2.5rem;
    font-weight: 800;
    line-height: 1;
    letter-spacing: -0.02em;
    width: 100%;
    overflow-wrap: break-word;
  }
  .build-label {
    color: var(--muted);
    font-size: 0.82rem;
    font-weight: 600;
    margin-top: 6px;
    margin-bottom: 10px;
  }

  .update-text {
    color: var(--muted);
    font-size: 0.86rem;
    font-weight: 600;
    line-height: 1.35;
    margin-bottom: 12px;
    min-height: 1.35em;
  }
  .update-text .u-date { color: #b7bfcf; }

  .spacer { flex: 1; }

  .action-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    width: 100%;
    background: var(--btn-bg);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 9px;
    padding: 9px 8px;
    font-size: 0.82rem;
    font-weight: 700;
    text-decoration: none;
    cursor: pointer;
    transition: background .15s ease;
  }
  .action-btn:hover { background: var(--btn-bg-hover); }
  .action-btn.disabled {
    opacity: 0.4;
    pointer-events: none;
  }

  /* ---------- Responsive ---------- */
  @media (max-width: 1100px) {
    .channel-row { flex-direction: column; }
    .panel { flex: 1 1 auto; }
  }

  @media (max-width: 640px) {
    .wrap { padding: 16px; }
    .top-header { flex-direction: column; align-items: stretch; }
    .header-right { justify-content: space-between; }
    .cards-grid { justify-content: space-between; }
    .card { width: 47%; min-width: 150px; height: 250px; }
    body { overflow-y: auto; }
  }
</style>
</head>
<body>
  <div class="wrap">

    <div class="top-header">
      <div class="title-block">
        <div class="title-row">
          <span class="title-dot"></span>
          <h1>빌드 배포 대시보드</h1>
        </div>
        <div class="subtitle">Alpha / Beta 채널 · App(Windows·macOS·Android·iOS) · Web(Viewer·Relay)</div>
      </div>

      <div class="header-right">
        <div class="last-refresh">
          <div class="label">마지막 갱신</div>
          <div class="value" id="lastRefreshValue">-</div>
        </div>

        <select class="autorefresh" id="autoRefreshSelect">
          <option value="0">자동 새로고침: 끄기</option>
          <option value="10">자동 새로고침: 10초</option>
          <option value="20">자동 새로고침: 20초</option>
          <option value="30">자동 새로고침: 30초</option>
          <option value="40">자동 새로고침: 40초</option>
          <option value="50">자동 새로고침: 50초</option>
          <option value="60">자동 새로고침: 60초</option>
        </select>

        <button class="refresh-btn" id="refreshBtn" title="새로고침">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="23 4 23 10 17 10"></polyline>
            <polyline points="1 20 1 14 7 14"></polyline>
            <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path>
          </svg>
          <span>새로고침</span>
        </button>
      </div>
    </div>

    <div id="channels"></div>

  </div>

<script src="builds.js"></script>
</body>
</html>
