<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>빌드 배포 대시보드</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0B0D12; --panel:#14171F; --panel-2:#191D26; --border:#262B36;
    --text-primary:#E7E9EE; --text-secondary:#9AA3B2; --text-muted:#5C6474;
    --alpha:#3DD6C4; --alpha-dim:#1B4A45; --beta:#F2A93B; --beta-dim:#4A3A17;
    --ok:#4ADE80; --err:#F87171; --pending:#6B7280;
    --font-sans:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;
    --font-mono:'JetBrains Mono','SFMono-Regular',Consolas,monospace;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--text-primary);font-family:var(--font-sans);min-height:100vh;padding:32px 24px 80px;}
  .wrap{max-width:1080px;margin:0 auto;}
  header{display:flex;align-items:flex-start;justify-content:space-between;gap:24px;margin-bottom:36px;flex-wrap:wrap;}
  .title-block h1{font-size:22px;font-weight:700;letter-spacing:-0.02em;margin-bottom:6px;}
  .title-block p{font-size:13px;color:var(--text-secondary);}
  .title-block .dot{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--ok);margin-right:4px;vertical-align:1px;}
  .header-right{display:flex;flex-direction:column;align-items:flex-end;gap:10px;}
  #last-sync{font-family:var(--font-mono);font-size:12px;color:var(--text-muted);}
  #refresh-btn{display:flex;align-items:center;gap:8px;background:var(--panel);border:1px solid var(--border);color:var(--text-primary);font-family:var(--font-sans);font-size:13px;font-weight:600;padding:9px 16px;border-radius:8px;cursor:pointer;transition:border-color .15s ease, background .15s ease;}
  #refresh-btn:hover{border-color:#333a4a;background:var(--panel-2);}
  #refresh-btn:active{transform:scale(0.98);}
  #refresh-btn.spinning svg{animation:spin .8s linear infinite;}
  #refresh-btn:disabled{opacity:.6;cursor:default;}
  @keyframes spin{to{transform:rotate(360deg);}}
  .channel-section{margin-bottom:40px;}
  .channel-heading{display:flex;align-items:center;gap:10px;margin-bottom:16px;}
  .channel-badge{font-family:var(--font-mono);font-size:11px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;padding:3px 9px;border-radius:5px;border:1px solid;}
  .channel-badge.alpha{color:var(--alpha);border-color:var(--alpha-dim);background:rgba(61,214,196,.08);}
  .channel-badge.beta{color:var(--beta);border-color:var(--beta-dim);background:rgba(242,169,59,.08);}
  .channel-heading h2{font-size:15px;font-weight:600;color:var(--text-secondary);}
  .card-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;}
  @media (max-width:900px){.card-grid{grid-template-columns:repeat(2,1fr);}}
  @media (max-width:520px){.card-grid{grid-template-columns:1fr;}}
  .card{background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:18px 16px;display:flex;flex-direction:column;gap:14px;min-height:180px;}
  .card-top{display:flex;align-items:center;justify-content:space-between;}
  .platform-label{display:flex;align-items:center;gap:8px;font-size:13px;font-weight:600;color:var(--text-secondary);}
  .platform-icon{width:18px;height:18px;flex-shrink:0;stroke:var(--text-secondary);}
  .status-dot{width:7px;height:7px;border-radius:50%;background:var(--pending);flex-shrink:0;}
  .status-dot.ok{background:var(--ok);}
  .status-dot.err{background:var(--err);}
  .status-dot.loading{background:var(--text-muted);animation:pulse 1s ease-in-out infinite;}
  @keyframes pulse{0%,100%{opacity:1;}50%{opacity:.3;}}
  .build-block{display:flex;flex-direction:column;gap:2px;}
  .build-number{font-family:var(--font-mono);font-size:30px;font-weight:700;line-height:1.1;letter-spacing:-0.01em;}
  .build-label{font-size:10px;color:var(--text-muted);text-transform:uppercase;letter-spacing:.06em;}
  .meta-row{display:flex;flex-direction:column;gap:4px;font-family:var(--font-mono);font-size:11.5px;color:var(--text-secondary);}
  .meta-row .version{color:var(--text-primary);font-weight:500;}
  .meta-row .updated-time{color:var(--text-muted);}
  .error-msg{font-size:12px;color:var(--err);line-height:1.5;}
  .download-btn{display:flex;align-items:center;justify-content:center;gap:7px;margin-top:auto;text-decoration:none;font-size:12.5px;font-weight:600;padding:9px 12px;border-radius:7px;border:1px solid var(--border);color:var(--text-primary);background:var(--panel-2);transition:border-color .15s ease, background .15s ease;}
  .download-btn:hover{border-color:var(--alpha-dim);background:rgba(61,214,196,.06);}
  .card.beta-card .download-btn:hover{border-color:var(--beta-dim);background:rgba(242,169,59,.06);}
  .download-btn svg{width:14px;height:14px;flex-shrink:0;}
  .download-btn.disabled{opacity:.4;pointer-events:none;}
  .skeleton{background:linear-gradient(90deg,var(--panel-2) 25%,#20242e 37%,var(--panel-2) 63%);background-size:400% 100%;animation:shimmer 1.4s ease infinite;border-radius:4px;height:30px;width:60%;}
  @keyframes shimmer{0%{background-position:100% 50%;}100%{background-position:0 50%;}}
  footer{margin-top:40px;font-size:11.5px;color:var(--text-muted);text-align:center;}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="title-block">
      <h1><span class="dot"></span>빌드 배포 대시보드</h1>
      <p>Alpha / Beta 채널 · Windows · macOS · Android · iOS · 서버리스 함수로 조회 (CORS 없음)</p>
    </div>
    <div class="header-right">
      <span id="last-sync">불러오는 중…</span>
      <button id="refresh-btn" onclick="refreshAll()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 12a9 9 0 1 1-2.64-6.36"/><path d="M21 3v6h-6"/>
        </svg>
        새로고침
      </button>
    </div>
  </header>

  <section class="channel-section">
    <div class="channel-heading"><span class="channel-badge alpha">Alpha</span><h2>알파 채널</h2></div>
    <div class="card-grid" id="alpha-grid"></div>
  </section>

  <section class="channel-section">
    <div class="channel-heading"><span class="channel-badge beta">Beta</span><h2>베타 채널</h2></div>
    <div class="card-grid" id="beta-grid"></div>
  </section>

  <footer>이 화면은 서버리스 함수(/api/builds)를 거쳐 version.json을 가져옵니다. 서버 쪽에서 직접 요청하므로 브라우저 CORS 제한이 적용되지 않습니다.</footer>
</div>

<script>
const PLATFORM_LABELS = { windows: "Windows", macos: "macOS", android: "Android", ios: "iOS" };
const ICONS = {
  windows: '<svg class="platform-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 5.5 10.5 4.4V11.3H3V5.5Z"/><path d="M11.5 4.3 21 3v8.2h-9.5V4.3Z"/><path d="M3 12.3h7.5v6.9L3 18.1v-5.8Z"/><path d="M11.5 12.3H21V21l-9.5-1.3v-7.4Z"/></svg>',
  macos: '<svg class="platform-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16.7 12.3c0-2 1.6-3 1.7-3.1-1-1.4-2.5-1.6-3-1.6-1.3-.1-2.5.7-3.1.7-.6 0-1.6-.7-2.7-.7-1.4 0-2.6.8-3.3 2-1.4 2.5-.4 6.1 1 8.1.7 1 1.5 2.1 2.5 2 1-.1 1.4-.6 2.6-.6 1.2 0 1.6.6 2.7.6 1.1 0 1.8-1 2.5-2 .8-1.1 1.1-2.2 1.1-2.3-.1 0-2-.8-2-3.1Z"/><path d="M14.5 5.8c.6-.7 1-1.7.9-2.7-.9.1-1.9.6-2.5 1.3-.5.6-1 1.6-.9 2.6 1 .1 1.9-.5 2.5-1.2Z"/></svg>',
  android: '<svg class="platform-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 9v7a1 1 0 0 0 1 1h10a1 1 0 0 0 1-1V9"/><path d="M4.5 9v5.5"/><path d="M19.5 9v5.5"/><path d="M9 20l.7-2"/><path d="M15 20l-.7-2"/><path d="M8 9V6a4 4 0 0 1 8 0v3"/><path d="M6 9h12"/><path d="M9.5 5.2 8.3 3.4"/><path d="M14.5 5.2 15.7 3.4"/></svg>',
  ios: '<svg class="platform-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="7" y="2" width="10" height="20" rx="2"/><line x1="11" y1="18" x2="13" y2="18"/></svg>'
};
const CHANNEL_ORDER = ["alpha", "beta"];
const PLATFORM_ORDER = ["windows", "macos", "android", "ios"];

function cardId(ck, pk){ return `card-${ck}-${pk}`; }

function renderSkeletonCard(ck, pk){
  const id = cardId(ck, pk);
  return `
    <div class="card ${ck}-card" id="${id}">
      <div class="card-top">
        <span class="platform-label">${ICONS[pk]}${PLATFORM_LABELS[pk]}</span>
        <span class="status-dot loading" id="${id}-dot"></span>
      </div>
      <div class="build-block" id="${id}-build"><div class="skeleton"></div></div>
      <div class="meta-row" id="${id}-meta"></div>
      <a class="download-btn disabled" id="${id}-dl" href="#">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3v12"/><path d="m7 10 5 5 5-5"/><path d="M5 21h14"/></svg>
        다운로드
      </a>
    </div>
  `;
}

function initGrids(){
  for(const ck of CHANNEL_ORDER){
    document.getElementById(`${ck}-grid`).innerHTML = PLATFORM_ORDER.map(pk => renderSkeletonCard(ck, pk)).join('');
  }
}

function formatDate(iso){
  if(!iso) return '알 수 없음';
  const d = new Date(iso);
  if(isNaN(d.getTime())) return iso;
  const pad = n => String(n).padStart(2,'0');
  return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}`;
}

function applyResult(ck, pk, result){
  const id = cardId(ck, pk);
  const dot = document.getElementById(`${id}-dot`);
  const buildBlock = document.getElementById(`${id}-build`);
  const meta = document.getElementById(`${id}-meta`);
  const dlBtn = document.getElementById(`${id}-dl`);

  if(result.ok){
    const data = result.data;
    dot.className = 'status-dot ok';
    buildBlock.innerHTML = `<span class="build-number">#${data.build ?? '-'}</span><span class="build-label">현재 빌드</span>`;
    meta.innerHTML = `<span class="version">v${data.version ?? '-'}${data.channel ? ' · ' + data.channel : ''}</span><span class="updated-time">업데이트: ${formatDate(data.releasedAt)}</span>`;
    dlBtn.href = result.download;
    dlBtn.classList.remove('disabled');
    dlBtn.setAttribute('target', '_blank');
    dlBtn.setAttribute('rel', 'noopener noreferrer');
  }else{
    dot.className = 'status-dot err';
    buildBlock.innerHTML = `<span class="error-msg">불러오기 실패: ${result.error}</span>`;
    meta.innerHTML = '';
    dlBtn.classList.add('disabled');
    dlBtn.removeAttribute('target');
  }
}

async function refreshAll(){
  const btn = document.getElementById('refresh-btn');
  const lastSync = document.getElementById('last-sync');
  btn.disabled = true;
  btn.classList.add('spinning');
  lastSync.textContent = '갱신 중…';

  for(const ck of CHANNEL_ORDER){
    for(const pk of PLATFORM_ORDER){
      const id = cardId(ck, pk);
      document.getElementById(`${id}-dot`).className = 'status-dot loading';
      document.getElementById(`${id}-build`).innerHTML = '<div class="skeleton"></div>';
      document.getElementById(`${id}-meta`).innerHTML = '';
    }
  }

  try{
    const res = await fetch('/api/builds', { cache: 'no-store' });
    const data = await res.json();
    for(const ck of CHANNEL_ORDER){
      for(const pk of PLATFORM_ORDER){
        applyResult(ck, pk, data[ck][pk]);
      }
    }
  }catch(err){
    for(const ck of CHANNEL_ORDER){
      for(const pk of PLATFORM_ORDER){
        applyResult(ck, pk, { ok: false, error: '서버 응답 없음', download: '#' });
      }
    }
  }

  btn.disabled = false;
  btn.classList.remove('spinning');
  const now = new Date();
  const pad = n => String(n).padStart(2,'0');
  lastSync.textContent = `마지막 갱신: ${now.getFullYear()}-${pad(now.getMonth()+1)}-${pad(now.getDate())} ${pad(now.getHours())}:${pad(now.getMinutes())}:${pad(now.getSeconds())}`;
}

initGrids();
refreshAll();
</script>
</body>
</html>
