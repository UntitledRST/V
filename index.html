<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>빌드 배포 대시보드</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #0B0D12;
    --panel: #14171F;
    --panel-2: #191D26;
    --border: #262B36;
    --border-soft: #1E222C;
    --text-primary: #E7E9EE;
    --text-secondary: #9AA3B2;
    --text-muted: #5C6474;
    --alpha: #3DD6C4;
    --alpha-dim: #1B4A45;
    --beta: #F2A93B;
    --beta-dim: #4A3A17;
    --ok: #4ADE80;
    --err: #F87171;
    --pending: #6B7280;
    --app-color: #60A5FA;
    --app-dim: #1E3A5F;
    --web-color: #C084FC;
    --web-dim: #3B2A57;
    --font-sans: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    --font-mono: 'JetBrains Mono', 'SFMono-Regular', Consolas, monospace;
  }

  *{ box-sizing: border-box; margin:0; padding:0; }

  html, body{ height: 100%; }

  body{
    background: var(--bg);
    color: var(--text-primary);
    font-family: var(--font-sans);
    display: flex;
    flex-direction: column;
    height: 100vh;
    overflow: hidden;
    padding: 16px 22px;
  }

  .wrap{
    flex: 1;
    display: flex;
    flex-direction: column;
    min-height: 0;
    max-width: 1240px;
    width: 100%;
    margin: 0 auto;
  }

  header{
    flex: 0 0 auto;
    display:flex;
    align-items:flex-start;
    justify-content:space-between;
    gap: 24px;
    margin-bottom: 14px;
    flex-wrap: wrap;
  }

  .title-block h1{ font-size: 19px; font-weight: 700; letter-spacing: -0.02em; margin-bottom: 3px; }
  .title-block p{ font-size: 12px; color: var(--text-secondary); }
  .title-block .dot{
    display:inline-block; width:6px; height:6px; border-radius:50%;
    background: var(--alpha); margin-right: 4px; vertical-align: 1px;
  }

  .header-right{ display:flex; flex-direction:column; align-items:flex-end; gap:8px; }
  .header-controls{ display:flex; align-items:center; gap:8px; }

  #last-sync{ font-family: var(--font-mono); font-size: 11px; color: var(--text-muted); }

  #auto-refresh-select{
    background: var(--panel); border: 1px solid var(--border); color: var(--text-primary);
    font-family: var(--font-sans); font-size: 12px; font-weight: 600;
    padding: 7px 9px; border-radius: 8px; cursor: pointer;
  }
  #auto-refresh-select:focus{ outline: none; border-color: var(--alpha-dim); }

  #refresh-btn{
    display:flex; align-items:center; gap:7px;
    background: var(--panel); border: 1px solid var(--border); color: var(--text-primary);
    font-family: var(--font-sans); font-size: 12.5px; font-weight: 600;
    padding: 8px 14px; border-radius: 8px; cursor: pointer;
    transition: border-color .15s ease, background .15s ease;
  }
  #refresh-btn:hover{ border-color: var(--border-soft); background: var(--panel-2); }
  #refresh-btn:active{ transform: scale(0.98); }
  #refresh-btn.spinning svg{ animation: spin 0.8s linear infinite; }
  #refresh-btn:disabled{ opacity: 0.6; cursor: default; }
  #refresh-btn svg{ width:14px; height:14px; }

  @keyframes spin{ to{ transform: rotate(360deg); } }

  .channels-row{
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 12px;
    min-height: 0;
  }

  .channel-section{
    flex: 1;
    display: flex;
    flex-direction: column;
    min-height: 0;
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px 14px;
    background: rgba(255,255,255,0.012);
  }

  .channel-heading{ flex: 0 0 auto; display:flex; align-items:center; gap:9px; margin-bottom: 10px; }

  .channel-badge{
    font-family: var(--font-mono); font-size: 10.5px; font-weight: 700;
    letter-spacing: 0.04em; text-transform: uppercase; padding: 2px 8px;
    border-radius: 5px; border: 1px solid;
  }
  .channel-badge.alpha{ color: var(--alpha); border-color: var(--alpha-dim); background: rgba(61,214,196,0.08); }
  .channel-badge.beta{ color: var(--beta); border-color: var(--beta-dim); background: rgba(242,169,59,0.08); }

  .channel-heading h2{ font-size: 14px; font-weight: 600; color: var(--text-secondary); }

  .channel-body{
    flex: 1;
    display: flex;
    gap: 14px;
    min-height: 0;
  }

  .app-block{
    flex: 3; display:flex; flex-direction:column; min-height:0;
    border: 1px solid var(--app-dim); border-radius: 10px; padding: 10px 10px 10px;
    background: rgba(96,165,250,0.03);
  }
  .web-block{
    flex: 1.4; display:flex; flex-direction:column; min-height:0;
    border: 1px solid var(--web-dim); border-radius: 10px; padding: 10px 10px 10px;
    background: rgba(192,132,252,0.03);
  }

  .subgroup-label{
    flex: 0 0 auto;
    font-family: var(--font-mono); font-size: 12.5px; font-weight: 700;
    text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 8px;
  }
  .subgroup-label.app{ color: var(--app-color); }
  .subgroup-label.web{ color: var(--web-color); }

  .card-grid{
    flex: 1;
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
    min-height: 0;
  }
  .card-grid.web-grid{ grid-template-columns: repeat(2, 1fr); }

  .card{
    background: var(--panel); border: 1px solid var(--border); border-radius: 10px;
    padding: 12px 12px; display:flex; flex-direction:column; gap: 8px;
    position: relative; min-height: 0;
  }

  .card-top{ flex: 0 0 auto; display:flex; align-items:center; justify-content:space-between; }

  .platform-label{ display:flex; align-items:center; gap:7px; font-size: 12px; font-weight: 600; color: var(--text-secondary); }

  .platform-icon{ width: 16px; height: 16px; flex-shrink:0; stroke: var(--text-secondary); }

  .status-dot{ width: 6px; height: 6px; border-radius: 50%; background: var(--pending); flex-shrink: 0; }
  .status-dot.ok{ background: var(--ok); }
  .status-dot.err{ background: var(--err); }
  .status-dot.loading{ background: var(--text-muted); animation: pulse 1s ease-in-out infinite; }
  @keyframes pulse{ 0%,100%{ opacity: 1; } 50%{ opacity: 0.3; } }

  .build-block{ flex: 1; display:flex; flex-direction: column; align-items: center; justify-content:center; gap: 2px; min-height: 0; text-align: center; }

  .build-number{ font-family: var(--font-mono); font-size: clamp(30px, 4.2vw, 46px); font-weight: 800; line-height: 1; letter-spacing: -0.02em; }
  .build-label{ font-size: 9px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.08em; }

  .meta-row{ flex: 0 0 auto; display:flex; flex-direction: column; gap: 3px; font-family: var(--font-mono); font-size: 10.5px; color: var(--text-secondary); }
  .meta-row .version{ color: var(--text-primary); font-weight: 500; }
  .meta-row .updated-time{ color: var(--text-secondary); font-size: 12.5px; font-weight: 500; }

  .error-msg{ font-size: 11px; color: var(--err); line-height: 1.4; }

  .download-btn{
    flex: 0 0 auto;
    display:flex; align-items:center; justify-content:center; gap: 6px;
    text-decoration: none; font-size: 11.5px; font-weight: 600; padding: 7px 10px;
    border-radius: 7px; border: 1px solid var(--border); color: var(--text-primary);
    background: var(--panel-2); transition: border-color .15s ease, background .15s ease;
  }
  .download-btn:hover{ border-color: var(--alpha-dim); background: rgba(61,214,196,0.06); }
  .card.beta-card .download-btn:hover{ border-color: var(--beta-dim); background: rgba(242,169,59,0.06); }
  .download-btn svg{ width:13px; height:13px; flex-shrink:0; }
  .download-btn.disabled{ opacity: 0.4; pointer-events: none; }

  .skeleton{
    background: linear-gradient(90deg, var(--panel-2) 25%, #20242e 37%, var(--panel-2) 63%);
    background-size: 400% 100%; animation: shimmer 1.4s ease infinite; border-radius: 4px; height: 22px; width: 60%;
  }
  @keyframes shimmer{ 0%{ background-position: 100% 50%; } 100%{ background-position: 0 50%; } }

  /* 모바일: 뷰포트 고정 대신 일반 스크롤 허용 */
  @media (max-width: 860px){
    html, body{ height: auto; }
    body{ display:block; overflow: auto; height: auto; padding: 20px 16px 60px; }
    .wrap{ display:block; }
    header{ margin-bottom: 20px; }
    .title-block h1{ font-size: 21px; }
    .title-block p{ font-size: 13px; }
    .channels-row{ display:block; }
    .channel-section{ display:block; margin-bottom: 22px; padding: 14px 14px; }
    .channel-heading{ margin-bottom: 14px; }
    .channel-body{ display:block; }
    .app-block, .web-block{ display:block; margin-bottom: 16px; }
    .subgroup-label{ margin: 4px 0 10px; }
    .card-grid{ display:grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
    .card-grid.web-grid{ grid-template-columns: repeat(2, 1fr); }
    .card{ min-height: 150px; padding: 16px 14px; gap: 12px; }
    .build-number{ font-size: clamp(34px, 11vw, 48px); }
    .meta-row{ font-size: 12px; }
    .meta-row .updated-time{ font-size: 14px; }
    .subgroup-label{ font-size: 14px; }
  }

  @media (max-width: 480px){
    .card-grid{ grid-template-columns: 1fr; }
    .card-grid.web-grid{ grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
<div class="wrap">

  <header>
    <div class="title-block">
      <h1><span class="dot"></span>빌드 배포 대시보드</h1>
      <p>Alpha / Beta 채널 · App(Windows·macOS·Android·iOS) · Web(Viewer·Host)</p>
    </div>
    <div class="header-right">
      <span id="last-sync">불러오는 중…</span>
      <div class="header-controls">
        <select id="auto-refresh-select" onchange="onAutoRefreshChange()">
          <option value="0">자동 새로고침: 끔</option>
          <option value="10">10초마다</option>
          <option value="20">20초마다</option>
          <option value="30">30초마다</option>
          <option value="40">40초마다</option>
          <option value="50">50초마다</option>
          <option value="60">60초마다</option>
        </select>
        <button id="refresh-btn" onclick="refreshAll()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 12a9 9 0 1 1-2.64-6.36"/>
            <path d="M21 3v6h-6"/>
          </svg>
          새로고침
        </button>
      </div>
    </div>
  </header>

  <div class="channels-row">
    <section class="channel-section">
      <div class="channel-heading"><span class="channel-badge alpha">Alpha</span><h2>알파 채널</h2></div>
      <div class="channel-body">
        <div class="app-block">
          <div class="subgroup-label app">App</div>
          <div class="card-grid" id="alpha-app-grid"></div>
        </div>
        <div class="web-block">
          <div class="subgroup-label web">Web</div>
          <div class="card-grid web-grid" id="alpha-web-grid"></div>
        </div>
      </div>
    </section>

    <section class="channel-section">
      <div class="channel-heading"><span class="channel-badge beta">Beta</span><h2>베타 채널</h2></div>
      <div class="channel-body">
        <div class="app-block">
          <div class="subgroup-label app">App</div>
          <div class="card-grid" id="beta-app-grid"></div>
        </div>
        <div class="web-block">
          <div class="subgroup-label web">Web</div>
          <div class="card-grid web-grid" id="beta-web-grid"></div>
        </div>
      </div>
    </section>
  </div>

</div>

<script>
const APP_PLATFORM_LABELS = { windows: 'Windows', macos: 'macOS', android: 'Android', ios: 'iOS' };
const APP_PLATFORM_ORDER = ['windows', 'macos', 'android', 'ios'];

const WEB_ITEM_LABELS = { viewer: 'Viewer', host: 'Host' };
const WEB_ITEM_ORDER = ['viewer', 'host'];

const CHANNEL_ORDER = ['alpha', 'beta'];
const CHANNEL_TAG = { alpha: 'alpha', beta: 'beta' };

const APP_ICONS = {
  windows: '<svg class="platform-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 5.5 10.5 4.4V11.3H3V5.5Z"/><path d="M11.5 4.3 21 3v8.2h-9.5V4.3Z"/><path d="M3 12.3h7.5v6.9L3 18.1v-5.8Z"/><path d="M11.5 12.3H21V21l-9.5-1.3v-7.4Z"/></svg>',
  macos: '<svg class="platform-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16.7 12.3c0-2 1.6-3 1.7-3.1-1-1.4-2.5-1.6-3-1.6-1.3-.1-2.5.7-3.1.7-.6 0-1.6-.7-2.7-.7-1.4 0-2.6.8-3.3 2-1.4 2.5-.4 6.1 1 8.1.7 1 1.5 2.1 2.5 2 1-.1 1.4-.6 2.6-.6 1.2 0 1.6.6 2.7.6 1.1 0 1.8-1 2.5-2 .8-1.1 1.1-2.2 1.1-2.3-.1 0-2-.8-2-3.1Z"/><path d="M14.5 5.8c.6-.7 1-1.7.9-2.7-.9.1-1.9.6-2.5 1.3-.5.6-1 1.6-.9 2.6 1 .1 1.9-.5 2.5-1.2Z"/></svg>',
  android: '<svg class="platform-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 9v7a1 1 0 0 0 1 1h10a1 1 0 0 0 1-1V9"/><path d="M4.5 9v5.5"/><path d="M19.5 9v5.5"/><path d="M9 20l.7-2"/><path d="M15 20l-.7-2"/><path d="M8 9V6a4 4 0 0 1 8 0v3"/><path d="M6 9h12"/><path d="M9.5 5.2 8.3 3.4"/><path d="M14.5 5.2 15.7 3.4"/></svg>',
  ios: '<svg class="platform-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="7" y="2" width="10" height="20" rx="2"/><line x1="11" y1="18" x2="13" y2="18"/></svg>'
};

const WEB_ICONS = {
  viewer: '<svg class="platform-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7-11-7-11-7Z"/><circle cx="12" cy="12" r="3"/></svg>',
  host: '<svg class="platform-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="6" rx="1.5"/><rect x="3" y="14" width="18" height="6" rx="1.5"/><line x1="7" y1="7" x2="7.01" y2="7"/><line x1="7" y1="17" x2="7.01" y2="17"/></svg>'
};

function appCardId(ck, pk){ return `card-app-${ck}-${pk}`; }
function webCardId(ck, ik){ return `card-web-${ck}-${ik}`; }

function downloadIcon(){
  return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3v12"/><path d="m7 10 5 5 5-5"/><path d="M5 21h14"/></svg>';
}
function openIcon(){
  return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 3h7v7"/><path d="M10 14 21 3"/><path d="M21 14v6a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1V5a1 1 0 0 1 1-1h6"/></svg>';
}

function renderAppSkeleton(ck, pk){
  const id = appCardId(ck, pk);
  return `
    <div class="card ${ck}-card" id="${id}">
      <div class="card-top">
        <span class="platform-label">${APP_ICONS[pk]}${APP_PLATFORM_LABELS[pk]}</span>
        <span class="status-dot loading" id="${id}-dot"></span>
      </div>
      <div class="build-block" id="${id}-build"><div class="skeleton"></div></div>
      <div class="meta-row" id="${id}-meta"></div>
      <a class="download-btn disabled" id="${id}-dl" href="#">${downloadIcon()}다운로드</a>
    </div>
  `;
}

function renderWebSkeleton(ck, ik){
  const id = webCardId(ck, ik);
  return `
    <div class="card ${ck}-card" id="${id}">
      <div class="card-top">
        <span class="platform-label">${WEB_ICONS[ik]}${WEB_ITEM_LABELS[ik]}</span>
        <span class="status-dot loading" id="${id}-dot"></span>
      </div>
      <div class="build-block" id="${id}-build"><div class="skeleton"></div></div>
      <div class="meta-row" id="${id}-meta"></div>
      <a class="download-btn disabled" id="${id}-dl" href="#">${openIcon()}웹 열기</a>
    </div>
  `;
}

function initGrids(){
  for(const ck of CHANNEL_ORDER){
    document.getElementById(`${ck}-app-grid`).innerHTML = APP_PLATFORM_ORDER.map(pk => renderAppSkeleton(ck, pk)).join('');
    document.getElementById(`${ck}-web-grid`).innerHTML = WEB_ITEM_ORDER.map(ik => renderWebSkeleton(ck, ik)).join('');
  }
}

function formatIsoDate(iso){
  if(!iso) return '알 수 없음';
  const d = new Date(iso);
  if(isNaN(d.getTime())) return String(iso);
  const pad = n => String(n).padStart(2,'0');
  return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}`;
}

function applyAppResult(ck, pk, result){
  const id = appCardId(ck, pk);
  const dot = document.getElementById(`${id}-dot`);
  const buildBlock = document.getElementById(`${id}-build`);
  const meta = document.getElementById(`${id}-meta`);
  const dlBtn = document.getElementById(`${id}-dl`);

  if(result && result.ok){
    const data = result.data || {};
    const buildNo = data.build ?? data.build_number ?? '-';
    dot.className = 'status-dot ok';
    buildBlock.innerHTML = `<span class="build-number">#${buildNo}</span><span class="build-label">현재 빌드</span>`;
    meta.innerHTML = `<span class="version">v${data.version ?? '-'} · ${CHANNEL_TAG[ck]}</span><span class="updated-time">업데이트: ${formatIsoDate(data.releasedAt)}</span>`;
    dlBtn.href = result.download;
    dlBtn.classList.remove('disabled');
    dlBtn.setAttribute('target', '_blank');
    dlBtn.setAttribute('rel', 'noopener noreferrer');
  }else{
    dot.className = 'status-dot err';
    buildBlock.innerHTML = `<span class="error-msg">불러오기 실패: ${result ? result.error : '응답 없음'}</span>`;
    meta.innerHTML = '';
    dlBtn.classList.add('disabled');
    dlBtn.removeAttribute('target');
  }
}

function applyWebResult(ck, ik, result){
  const id = webCardId(ck, ik);
  const dot = document.getElementById(`${id}-dot`);
  const buildBlock = document.getElementById(`${id}-build`);
  const meta = document.getElementById(`${id}-meta`);
  const dlBtn = document.getElementById(`${id}-dl`);

  if(result && result.ok){
    const data = result.data || {};
    const buildNo = data.build_number ?? data.build ?? '-';
    dot.className = 'status-dot ok';
    buildBlock.innerHTML = `<span class="build-number">#${buildNo}</span><span class="build-label">현재 빌드</span>`;

    const versionLine = `<span class="version">v${data.version ?? '-'} · ${CHANNEL_TAG[ck]}</span>`;
    const timeLine = (ik === 'host')
      ? ''
      : `<span class="updated-time">업데이트: ${result.buildDate ? result.buildDate : (result.buildDateError || '알 수 없음')}</span>`;
    meta.innerHTML = versionLine + timeLine;

    dlBtn.href = result.open;
    dlBtn.classList.remove('disabled');
    dlBtn.setAttribute('target', '_blank');
    dlBtn.setAttribute('rel', 'noopener noreferrer');
  }else{
    dot.className = 'status-dot err';
    buildBlock.innerHTML = `<span class="error-msg">불러오기 실패: ${result ? result.error : '응답 없음'}</span>`;
    meta.innerHTML = '';
    dlBtn.classList.add('disabled');
    dlBtn.removeAttribute('target');
  }
}

function resetToLoading(){
  for(const ck of CHANNEL_ORDER){
    for(const pk of APP_PLATFORM_ORDER){
      const id = appCardId(ck, pk);
      document.getElementById(`${id}-dot`).className = 'status-dot loading';
      document.getElementById(`${id}-build`).innerHTML = '<div class="skeleton"></div>';
      document.getElementById(`${id}-meta`).innerHTML = '';
    }
    for(const ik of WEB_ITEM_ORDER){
      const id = webCardId(ck, ik);
      document.getElementById(`${id}-dot`).className = 'status-dot loading';
      document.getElementById(`${id}-build`).innerHTML = '<div class="skeleton"></div>';
      document.getElementById(`${id}-meta`).innerHTML = '';
    }
  }
}

async function refreshAll(){
  const btn = document.getElementById('refresh-btn');
  const lastSync = document.getElementById('last-sync');
  btn.disabled = true;
  btn.classList.add('spinning');
  lastSync.textContent = '갱신 중…';

  resetToLoading();

  try{
    const res = await fetch('/api/builds', { cache: 'no-store' });
    const data = await res.json();
    for(const ck of CHANNEL_ORDER){
      for(const pk of APP_PLATFORM_ORDER){
        applyAppResult(ck, pk, data[ck].app[pk]);
      }
      for(const ik of WEB_ITEM_ORDER){
        applyWebResult(ck, ik, data[ck].web[ik]);
      }
    }
  }catch(err){
    for(const ck of CHANNEL_ORDER){
      for(const pk of APP_PLATFORM_ORDER){
        applyAppResult(ck, pk, { ok: false, error: '서버 응답 없음' });
      }
      for(const ik of WEB_ITEM_ORDER){
        applyWebResult(ck, ik, { ok: false, error: '서버 응답 없음' });
      }
    }
  }

  btn.disabled = false;
  btn.classList.remove('spinning');
  const now = new Date();
  const pad = n => String(n).padStart(2,'0');
  lastSync.textContent = `마지막 갱신: ${now.getFullYear()}-${pad(now.getMonth()+1)}-${pad(now.getDate())} ${pad(now.getHours())}:${pad(now.getMinutes())}:${pad(now.getSeconds())}`;
}

let autoRefreshTimer = null;

function onAutoRefreshChange(){
  const select = document.getElementById('auto-refresh-select');
  const seconds = parseInt(select.value, 10);

  if(autoRefreshTimer){
    clearInterval(autoRefreshTimer);
    autoRefreshTimer = null;
  }

  if(seconds > 0){
    autoRefreshTimer = setInterval(refreshAll, seconds * 1000);
  }
}

initGrids();
refreshAll();
</script>
