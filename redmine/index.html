<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>RC8 일감 현황</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<style>
  :root{
    --bg: #0a0e14;
    --panel-bg: #10161f;
    --panel-border: #1e2733;
    --card-bg: #131a24;
    --text-primary: #eef2f7;
    --text-secondary: #93a1b3;
    --text-tertiary: #5b6b80;
    --blue: #5b9dff;
    --purple: #c084fc;
    --green: #34d399;
    --yellow: #fbbf24;
    --red: #ef4444;
    --orange: #fb923c;
    --radius-lg: 14px;
    --radius-md: 10px;
    --mono: 'JetBrains Mono', ui-monospace, 'SF Mono', Menlo, monospace;
    --sans: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Pretendard, sans-serif;
  }
  *{ box-sizing:border-box; }
  html, body{
    margin:0; padding:0; background:var(--bg); color:var(--text-primary);
    font-family:var(--sans); -webkit-font-smoothing:antialiased;
    overflow-x:hidden;
  }
  .wrap{
    width:100%; margin:0; padding:24px 32px 40px;
  }

  #errorBox:empty{ display:none; }
  .last-updated{ margin:0 0 12px; font-size:15px; color:var(--text-secondary); }
  .last-updated span{ color:var(--green); font-family:var(--mono); }
  .last-updated{ margin:0 0 14px; font-size:14px; color:var(--text-secondary); }
  .last-updated span{ color:var(--green); font-family:var(--mono); }

  /* ---- 메인 영역: 자연스러운 세로 흐름 (필요하면 페이지 자체가 스크롤됨) ---- */
  .main-grid{
    display:flex; flex-direction:column; gap:14px;
  }

  /* 상단: 통계 카드 4개 한 줄 */
  .stat-row{
    display:grid; grid-template-columns: repeat(4, 1fr); gap:14px;
  }
  .stat-card{
    background:var(--card-bg); border:1px solid var(--panel-border); border-radius:var(--radius-md);
    padding:16px 18px; display:flex; flex-direction:column; justify-content:center;
  }
  .stat-card.clickable{ cursor:pointer; transition: transform .12s ease, border-color .12s ease; }
  .stat-card.clickable:hover{ transform: translateY(-2px); border-color: var(--blue); }
  .stat-card .label{ font-size:16px; color:var(--text-secondary); margin-bottom:6px; }
  .stat-card .value{ font-size:46px; font-weight:800; font-family:var(--mono); }
  .stat-card.notdone .value{ color:var(--yellow); }
  .stat-card.done .value{ color:var(--green); }
  .stat-card.rate .value{ color:var(--blue); }

  /* 중단: 전체 이슈 목록, 전체 폭 (내용이 많을 수 있으니 내부 스크롤 유지) */
  .issues-panel{
    display:flex; flex-direction:column;
  }
  .issues-panel .issues-table-scroll{ max-height:42vh; overflow:auto; }

  /* 요약 패널 4개: 한 줄에 나란히, 스크롤 없이 전체 표시 */
  .panels{
    display:grid; grid-template-columns: repeat(3, 1fr); gap:14px;
  }
  .panels .panel{ display:flex; flex-direction:column; overflow:visible; }

  /* 누적 차트: 전체 폭 + 큰 높이로 추세가 잘 보이도록 */
  .chart-panel{ display:flex; flex-direction:column; }
  .chart-wrap{ position:relative; height:340px; }

  @media (max-width: 1100px){
    .panels{ grid-template-columns: repeat(2, 1fr); }
  }

  @media (max-width: 900px){
    .wrap{ padding:16px 14px 32px; }
    .stat-row{ grid-template-columns: repeat(2, 1fr); gap:10px; }
    .stat-card{ min-height:64px; padding:12px 14px; }
    .stat-card .label{ font-size:18px; }
    .stat-card .value{ font-size:38px; }
    .panel{ padding:14px 14px; }
    .panel h2{ font-size:22px; margin-bottom:10px; }
    table{ font-size:17px; }
    th{ font-size:14px; padding:5px 6px; }
    td{ padding:9px 8px; }
    .pill{ font-size:15px; padding:4px 10px; }
    .status-badge{ font-size:14px; padding:4px 8px; }
    .filter-chip{ font-size:15px; padding:6px 12px; }
    .empty, .loading, .error-box{ font-size:16px; }

    .issues-panel .issues-table-scroll{ max-height:340px; }
    .panels{ grid-template-columns: 1fr; gap:10px; }
    .chart-wrap{ height:300px; }

    /* 표 내용이 화면보다 넓으면 잘리지 않고 옆으로 스크롤되도록 함 */
    .panel{ overflow-x:auto; }
    .title-cell{ max-width:340px; }
  }

  @media (max-width: 480px){
    .stat-row{ grid-template-columns: 1fr 1fr; }
    .stat-card .value{ font-size:32px; }
    table{ font-size:15px; }
    th{ font-size:12.5px; }
    .title-cell{ max-width:260px; }
    .chart-wrap{ height:260px; }
  }

  .panel{
    background:var(--panel-bg); border:1px solid var(--panel-border); border-radius:var(--radius-lg);
    padding:14px 16px;
  }
  .panel h2{ margin:0 0 12px; font-size:20px; font-weight:800; letter-spacing:0.01em; flex:0 0 auto; }
  .panel h2.c-blue{ color:var(--blue); }
  .panel h2.c-purple{ color:var(--purple); }
  .panel h2.c-orange{ color:var(--orange); }
  .panel h2.c-green{ color:var(--green); }

  table{ width:100%; border-collapse:collapse; font-size:15px; }
  th{ text-align:left; color:var(--text-secondary); font-weight:600; font-size:13px; text-transform:uppercase; letter-spacing:0.03em; padding:6px 8px; border-bottom:1px solid var(--panel-border); }
  td{ padding:8px 9px; border-bottom:1px solid rgba(255,255,255,0.04); }
  tr.total-row td{ font-weight:800; color:var(--text-primary); border-top:1px solid var(--panel-border); }
  tr.clickable{ cursor:pointer; }
  tr.clickable:hover td{ background:rgba(91,157,255,0.07); }
  .pill{ display:inline-block; padding:3px 11px; border-radius:999px; font-size:14px; font-weight:700; }
  .pill.done{ background:rgba(52,211,153,0.15); color:var(--green); }
  .pill.notdone{ background:rgba(251,191,36,0.15); color:var(--yellow); }
  .mono{ font-family:var(--mono); }
  .num{ text-align:right; font-family:var(--mono); }

  .issues-panel h2{ display:flex; align-items:center; justify-content:space-between; }
  .filter-chip{
    display:none; align-items:center; gap:6px; background:rgba(91,157,255,0.14); color:var(--blue);
    font-size:14.5px; font-weight:700; padding:5px 12px; border-radius:999px; cursor:pointer;
  }
  .filter-chip.active{ display:inline-flex; }
  .filter-chip .x{ font-weight:900; }

  .issues-table-scroll{ overflow:auto; }
  .issues-table-scroll table{ font-size:16px; }
  .issues-table-scroll th{ position:sticky; top:0; background:var(--panel-bg); }
  .status-badge{ font-size:13px; font-weight:700; padding:3px 9px; border-radius:6px; white-space:nowrap; }
  .status-badge.notdone{ background:rgba(251,191,36,0.15); color:var(--yellow); }
  .status-badge.done{ background:rgba(255,255,255,0.06); color:var(--text-tertiary); }
  a.issue-link{ color:var(--blue); text-decoration:none; font-family:var(--mono); }
  a.issue-link:hover{ text-decoration:underline; }
  .title-cell{ max-width:900px; }
  a.title-link{ color:var(--text-primary); text-decoration:none; }
  a.title-link:hover{ color:var(--blue); text-decoration:underline; }

  .empty, .loading{ color:var(--text-tertiary); font-size:15px; padding:20px 0; text-align:center; }
  .error-box{
    background:rgba(239,68,68,0.1); border:1px solid rgba(239,68,68,0.3); color:#fca5a5;
    padding:10px 14px; border-radius:var(--radius-md); font-size:15px; margin-bottom:10px;
  }
</style>
</head>
<body>
<div class="wrap">

  <p id="lastUpdated" class="last-updated">불러오는 중&hellip;</p>

  <p id="lastUpdated" class="last-updated"></p>

  <div id="errorBox"></div>

  <div class="main-grid">

  <div class="stat-row" id="statRow">
    <div class="stat-card notdone clickable" data-filter-type="quick" data-filter-value="notdone"><div class="label">미처리</div><div class="value">&mdash;</div></div>
    <div class="stat-card done clickable" data-filter-type="quick" data-filter-value="done"><div class="label">처리완료</div><div class="value">&mdash;</div></div>
    <div class="stat-card total clickable" data-filter-type="quick" data-filter-value="all"><div class="label">전체 이슈</div><div class="value">&mdash;</div></div>
    <div class="stat-card rate"><div class="label">처리율</div><div class="value">&mdash;</div></div>
  </div>

  <div class="panel issues-panel">
    <h2>
      <span>전체 이슈 목록 (<span id="issueCount">0</span>건)</span>
      <span class="filter-chip" id="filterChip"><span id="filterLabel"></span><span class="x">&times;</span></span>
    </h2>
    <div class="issues-table-scroll">
      <table>
        <thead>
          <tr>
            <th style="width:44px">번호</th>
            <th style="width:80px">일감번호</th>
            <th>분류</th>
            <th>상태</th>
            <th>제목</th>
            <th>우선순위</th>
            <th>담당자</th>
            <th>작성시간</th>
          </tr>
        </thead>
        <tbody id="issuesBody"><tr><td colspan="8" class="loading">불러오는 중&hellip;</td></tr></tbody>
      </table>
    </div>
  </div>

  <div class="panels">
    <div class="panel">
      <h2 class="c-blue">담당자별 집계</h2>
      <table>
        <thead><tr><th>담당자</th><th>완료여부</th><th>할당/처리</th><th style="text-align:right">처리율</th></tr></thead>
        <tbody id="assigneeBody"><tr><td colspan="4" class="loading">불러오는 중&hellip;</td></tr></tbody>
      </table>
    </div>

    <div class="panel">
      <h2 class="c-purple">분류별 집계</h2>
      <table>
        <thead><tr><th>분류</th><th style="text-align:right">진행중</th><th style="text-align:right">완료됨</th><th style="text-align:right">합계</th></tr></thead>
        <tbody id="trackerBody"><tr><td colspan="4" class="loading">불러오는 중&hellip;</td></tr></tbody>
      </table>
    </div>

    <div class="panel">
      <h2 class="c-orange">상태별 집계</h2>
      <table>
        <thead><tr><th>상태</th><th style="text-align:right">개수</th></tr></thead>
        <tbody id="statusBody"><tr><td colspan="2" class="loading">불러오는 중&hellip;</td></tr></tbody>
      </table>
    </div>
  </div>

  <div class="panels">
    <div class="panel">
      <h2 class="c-green">우선순위별 집계</h2>
      <table>
        <thead><tr><th>우선순위</th><th style="text-align:right">개수</th></tr></thead>
        <tbody id="priorityBody"><tr><td colspan="2" class="loading">불러오는 중&hellip;</td></tr></tbody>
      </table>
    </div>

    <div class="panel">
      <h2 class="c-blue">파트별 집계</h2>
      <table>
        <thead><tr><th>파트</th><th style="text-align:right">진행중</th><th style="text-align:right">완료됨</th><th style="text-align:right">합계</th></tr></thead>
        <tbody id="partBody"><tr><td colspan="4" class="loading">불러오는 중&hellip;</td></tr></tbody>
      </table>
    </div>

    <div class="panel">
      <h2 class="c-purple">접속유형별 집계</h2>
      <table>
        <thead><tr><th>접속유형</th><th style="text-align:right">진행중</th><th style="text-align:right">완료됨</th><th style="text-align:right">합계</th></tr></thead>
        <tbody id="connTypeBody"><tr><td colspan="4" class="loading">불러오는 중&hellip;</td></tr></tbody>
      </table>
    </div>
  </div>

  <div class="panel chart-panel">
    <h2 class="c-blue">누적 이슈 / 해결 추이</h2>
    <div class="chart-wrap"><canvas id="trendChart"></canvas></div>
  </div>

  </div>
</div>

<script>
  var state = { issues: [], summary: null, filter: { type: null, value: null } };
  var chart = null;

  function escapeHtml(s){
    return String(s == null ? '' : s).replace(/[&<>"']/g, function(c){
      return { '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;' }[c];
    });
  }

  function fmtTime(t){
    if (!t) return '<span style="color:var(--text-tertiary)">&mdash;</span>';
    var parts = t.split(' ');
    return escapeHtml(parts[0]) + '<br><span style="color:#ffffff;font-size:14px;font-weight:600">' + escapeHtml(parts[1] || '') + '</span>';
  }

  function isNotDoneStatus(s){
    return ['신규','진행','피드백'].some(function(k){ return (s||'').indexOf(k) !== -1; });
  }

  // ====== 파트/접속유형/기능/환경 분류 규칙 ======
  // 실제 데이터(API)에는 이 4가지가 별도 필드로 없어서, 제목(및 제목 속 [대괄호] 태그)에서
  // 아래 키워드를 찾아 자동 분류합니다. 실데이터로 확인 후 안 맞으면 이 키워드 목록만 수정하면 됩니다.
  var CLASSIFY_RULES = {
    part: {
      order: ['기획', '디자인', '개발'],
      // 문장 내용을 보고 판단: "확정 필요/정책 정의/여부 검토" 같은 표현이 있으면 기획,
      // "UI 사용성/정렬/그림자/개행" 같은 표현이 있으면 디자인, 그 외엔 기본적으로 개발(기능 버그)로 간주
      planningKeywords: [
        '확정 요청', '확정 필요', '정책 확정', '정책 정의', '미정의', '정의 필요',
        '여부 확인 필요', '여부 검토', '기획 확인', '기획요청', '기획 불일치',
        '모순', '유지 여부', '계승 여부'
      ],
      designKeywords: [
        '디자인 정리', '디자인 개선', 'ui 사용성', 'ui·구성', 'ui 경계',
        '레이아웃', '그림자', '라운드 테두리', '컬럼 잘림', '구성 위치',
        '개행 어색', '정렬이 상이', '디자인'
      ]
    },
    connType: {
      // '뷰어 응용'을 '뷰어'보다 먼저 검사해야 오분류가 안 됩니다.
      order: ['뷰어', '호스트', '에이전트'],
      checkOrder: ['뷰어 응용', '뷰어', '호스트', '에이전트'],
      keywords: {
        '뷰어 응용': ['뷰어응용', '뷰어 응용', '응용뷰어', '응용 뷰어', '뷰어앱', '뷰어 app', 'app viewer'],
        '뷰어': ['뷰어', '웹뷰어', 'viewer'],
        '호스트': ['호스트', 'host'],
        '에이전트': ['에이전트', 'agent']
      }
    },
    env: {
      order: ['Win', 'Mac', 'Android', 'IOS', '기타'],
      keywords: {
        'Win': ['win', 'windows', '윈도우', '윈도우즈', '윈'],
        'Mac': ['mac', 'macos', '맥'],
        'Android': ['android', '안드로이드'],
        'IOS': ['ios', '아이폰', '아이패드', 'iphone', 'ipad']
      }
    },
    // 기능별 집계: 상위 5개 기능 영역으로 묶어서 분류 (우선순위 순서대로 매칭, 먼저 맞는 것으로 확정)
    feature: {
      order: ['접속/연결/로그인', '화면공유/모니터', '파일전송/공유함', '그리기/원격제어', '상담/채팅/UI', '기타'],
      buckets: [
        { label: '접속/연결/로그인', keywords: ['접속', '연결', '로그인', 'login', '로그아웃', '세션', '중계', 'vp', '재연결', '대기', 'welcome', '입장', '네트워크', '버전', '업데이트', '실행 실패', '초기화', '모듈'] },
        { label: '화면공유/모니터', keywords: ['화면 공유', '화면공유', '모니터', 'pip', '화면 조절', '화면조절', '전체 화면', '전체화면', '화질', '디스플레이', '해상도', '축소', '확대', '화면 미표시', '화면 전환', '미니맵', '회색', '카메라', '마이크'] },
        { label: '파일전송/공유함', keywords: ['파일 전송', '파일전송', '공유함', '파일함', '업로드', '다운로드', '첨부'] },
        { label: '그리기/원격제어', keywords: ['그리기', '원격 제어', '원격제어', '포인터', '커서', '오브젝트', '스티커', '특수키', '마우스', '텍스트'] },
        { label: '상담/채팅/UI', keywords: ['상담', '채팅', '다국어', '문구', '팝업', 'ui', '버튼', '툴바', '메뉴', 'gnb', '설정', '알럿', '토스트', '메시지'] }
      ]
    },
  };

  function parseTags(title){
    var tags = [];
    var re = /\[([^\[\]]+)\]/g;
    var m;
    while ((m = re.exec(title || '')) !== null){
      tags.push(m[1].trim());
    }
    return tags;
  }

  function hasIStartWord(text){
    // '아이폰'/'아이패드'(iOS 관련 단어) 또는 'i'로 시작하는 영문 단어(iOS/iPhone 등)가 있는지 확인
    // (단순히 '아이'로 시작하는지만 보면 '아이콘' 같은 무관한 단어까지 걸려서, 정확히 '아이폰/아이패드' 단어인지 확인)
    var tokens = String(text || '').split(/[\s\[\]\(\)\u2014\-:,./]+/);
    return tokens.some(function(tok){
      if (!tok) return false;
      if (tok.indexOf('아이폰') !== -1 || tok.indexOf('아이패드') !== -1) return true;
      return /^i/i.test(tok);
    });
  }

  function matchesKeywordList(text, list){
    if (!text) return false;
    var lower = String(text).toLowerCase();
    return list.some(function(k){ return lower.indexOf(String(k).toLowerCase()) !== -1; });
  }

  function matchCategoryFromText(text, keywordMap, checkOrder){
    if (!text) return null;
    var lower = String(text).toLowerCase();
    var keys = checkOrder || Object.keys(keywordMap);
    for (var i = 0; i < keys.length; i++){
      var label = keys[i];
      var kws = keywordMap[label] || [];
      for (var j = 0; j < kws.length; j++){
        if (lower.indexOf(String(kws[j]).toLowerCase()) !== -1) return label;
      }
    }
    return null;
  }

  function classifyIssues(issues){
    issues.forEach(function(it){
      var allTags = parseTags(it.제목);
      // 제목의 맨 앞 [대괄호]는 "[SaaS_8.0.1_QA]" 같은 프로젝트/버전 태그라서 분류 대상에서 항상 제외
      var tags = allTags.slice(1);
      var tagText = tags.join(' ');
      var title = it.제목 || '';

      // 파트: 대괄호 태그가 아니라 문장 전체 내용(표현)을 보고 기획/디자인/개발을 판단
      // ("기획(Figma)와 불일치" 같은 참고 문구가 워낙 많아, 단순 "기획" 단어 매칭은 오분류를 유발하기 쉬움)
      if (matchesKeywordList(title, CLASSIFY_RULES.part.planningKeywords)) {
        it.__part = '기획';
      } else if (matchesKeywordList(title, CLASSIFY_RULES.part.designKeywords)) {
        it.__part = '디자인';
      } else {
        it.__part = '개발';
      }

      // 접속유형/환경: 대괄호 태그를 먼저 보고, 태그에서 못 찾으면 본문 전체에서 찾음
      // (Mac Host, windows app viewer 처럼 대괄호 없이 본문에만 쓰인 경우 대응)
      it.__connType =
        matchCategoryFromText(tagText, CLASSIFY_RULES.connType.keywords, CLASSIFY_RULES.connType.checkOrder) ||
        matchCategoryFromText(title, CLASSIFY_RULES.connType.keywords, CLASSIFY_RULES.connType.checkOrder) ||
        '기타';

      // '뷰어 응용'은 별도 항목을 없애고 '뷰어'로 통합
      if (it.__connType === '뷰어 응용') {
        it.__connType = '뷰어';
      }
      // 접속유형 신호가 전혀 없는 이슈는, 내용을 보고 가장 가까운 곳으로 배정
      // (중계 페이지·특정 호스트 기기 모델명 → 호스트, 파트너/어드민/네트워크 설정 → 에이전트, 그 외엔 가장 흔한 '뷰어' 기본값)
      if (it.__connType === '기타') {
        if (matchesKeywordList(title, ['중계', 'm1', 'm4'])) {
          it.__connType = '호스트';
        } else if (matchesKeywordList(title, ['어드민', '파트너', '네트워크 그룹'])) {
          it.__connType = '에이전트';
        } else {
          it.__connType = '뷰어';
        }
      }
      it.__env =
        matchCategoryFromText(tagText, CLASSIFY_RULES.env.keywords) ||
        matchCategoryFromText(title, CLASSIFY_RULES.env.keywords) ||
        '기타';

      // '모바일 호스트' 이슈인데 환경이 아직 '기타'라면, iOS 관련 단어(아이-, i-)가 없는 경우 Android로 기본 배정
      if (it.__env === '기타' && title.indexOf('모바일') !== -1 && !hasIStartWord(title)) {
        it.__env = 'Android';
      }

      // 기능: 제목 전체 내용을 보고 5개 상위 기능 영역 중 하나로 분류 (우선순위 순서대로 먼저 맞는 것)
      it.__feature = classifyFeatureBucket(title);
    });
  }

  function classifyFeatureBucket(title){
    var buckets = CLASSIFY_RULES.feature.buckets;
    for (var i = 0; i < buckets.length; i++){
      if (matchesKeywordList(title, buckets[i].keywords)) return buckets[i].label;
    }
    return '기타';
  }

  // 이슈 목록을 지정한 필드(keyField) 기준으로 진행중/완료됨/합계 집계
  // order가 있으면 그 순서대로(마지막 '기타'는 미지정 항목까지 합산), 없으면 합계 내림차순('기타'는 항상 마지막)
  function aggregateGeneric(list, keyField, order){
    var map = {};
    list.forEach(function(it){
      var key = it[keyField] || '기타';
      if (!map[key]) map[key] = { label: key, progress: 0, done: 0, total: 0 };
      map[key].total++;
      if (isNotDoneStatus(it.상태)) map[key].progress++; else map[key].done++;
    });

    if (order){
      var known = order.filter(function(k){ return k !== '기타'; });
      var rows = known.map(function(k){
        return map[k] || { label: k, progress: 0, done: 0, total: 0 };
      });
      if (order.indexOf('기타') !== -1){
        var etc = { label: '기타', progress: 0, done: 0, total: 0 };
        Object.keys(map).forEach(function(k){
          if (known.indexOf(k) === -1){
            etc.progress += map[k].progress;
            etc.done += map[k].done;
            etc.total += map[k].total;
          }
        });
        rows.push(etc);
      }
      return rows;
    }

    var keys = Object.keys(map).filter(function(k){ return k !== '기타'; });
    keys.sort(function(a, b){ return map[b].total - map[a].total; });
    var rows2 = keys.map(function(k){ return map[k]; });
    if (map['기타']) rows2.push(map['기타']);
    return rows2;
  }

  async function loadData(){
    document.getElementById('errorBox').innerHTML = '';

    try {
      var res = await fetch('/api/issues');
      var data = await res.json();
      if (!data.ok) throw new Error(data.error || '알 수 없는 오류');

      state.issues = data.issues;
      state.summary = data.summary;
      classifyIssues(state.issues);

      renderAll();

      var d = new Date(data.fetchedAt);
      document.getElementById('lastUpdated').innerHTML =
        '마지막 업데이트: <span>' + d.toLocaleString('ko-KR') + '</span> · 총 ' + data.count + '건';
    } catch (err) {
      document.getElementById('errorBox').innerHTML =
        '<div class="error-box">데이터를 불러오지 못했습니다: ' + escapeHtml(err.message || err) + '</div>';
    }
  }

  function renderAll(){
    renderStats();
    renderAssignees();
    renderTrackers();
    renderStatuses();
    renderPriorities();
    renderPart();
    renderConnType();
    renderChart();
    renderIssues();
  }

  function renderStats(){
    var c = state.summary.completion;
    var rate = c.total === 0 ? 0 : Math.round((c.done / c.total) * 100);
    var cards = document.querySelectorAll('.stat-card .value');
    cards[0].textContent = c.notDone;
    cards[1].textContent = c.done;
    cards[2].textContent = c.total;
    cards[3].textContent = rate + '%';

    document.querySelectorAll('.stat-card[data-filter-type]').forEach(function(card){
      card.onclick = function(){
        setFilter(card.getAttribute('data-filter-type'), card.getAttribute('data-filter-value'));
      };
    });
  }

  function renderAssignees(){
    var rows = state.summary.assignees.map(function(a){
      return '<tr class="clickable" data-filter-type="assignee" data-filter-value="' + escapeHtml(a.name) + '">' +
        '<td>' + escapeHtml(a.name) + '</td>' +
        '<td><span class="pill ' + (a.complete ? 'done' : 'notdone') + '">' + (a.complete ? '완료' : '미완료') + '</span></td>' +
        '<td class="mono">' + a.total + '/' + a.done + '</td>' +
        '<td class="num">' + a.rate + '%</td>' +
      '</tr>';
    }).join('');
    document.getElementById('assigneeBody').innerHTML = rows || '<tr><td colspan="4" class="empty">데이터 없음</td></tr>';
    bindFilterableRows('assigneeBody');
  }

  function renderTrackers(){
    var t = state.summary.trackers;
    var sumP = 0, sumD = 0, sumT = 0;
    var rows = t.map(function(x){
      sumP += x.progress; sumD += x.done; sumT += x.total;
      return '<tr class="clickable" data-filter-type="tracker" data-filter-value="' + escapeHtml(x.label) + '">' +
        '<td>' + escapeHtml(x.label) + '</td><td class="num">' + x.progress + '</td><td class="num">' + x.done + '</td><td class="num">' + x.total + '</td></tr>';
    }).join('');
    rows += '<tr class="total-row"><td>합계</td><td class="num">' + sumP + '</td><td class="num">' + sumD + '</td><td class="num">' + sumT + '</td></tr>';
    document.getElementById('trackerBody').innerHTML = rows;
    bindFilterableRows('trackerBody');
  }

  function renderStatuses(){
    var s = state.summary.statuses;
    var sum = 0;
    var rows = s.map(function(x){
      sum += x.count;
      return '<tr class="clickable" data-filter-type="status" data-filter-value="' + escapeHtml(x.label) + '">' +
        '<td>' + escapeHtml(x.label) + '</td><td class="num">' + x.count + '</td></tr>';
    }).join('');
    rows += '<tr class="total-row"><td>합계</td><td class="num">' + sum + '</td></tr>';
    document.getElementById('statusBody').innerHTML = rows;
    bindFilterableRows('statusBody');
  }

  function renderPriorities(){
    var p = state.summary.priorities;
    var sum = 0;
    var rows = p.map(function(x){
      sum += x.count;
      return '<tr class="clickable" data-filter-type="priority" data-filter-value="' + escapeHtml(x.label) + '">' +
        '<td>' + escapeHtml(x.label) + '</td><td class="num">' + x.count + '</td></tr>';
    }).join('');
    rows += '<tr class="total-row"><td>합계</td><td class="num">' + sum + '</td></tr>';
    document.getElementById('priorityBody').innerHTML = rows;
    bindFilterableRows('priorityBody');
  }

  function renderAggPanel(tbodyId, rows, filterType){
    var sumP = 0, sumD = 0, sumT = 0;
    var body = rows.map(function(r){
      sumP += r.progress; sumD += r.done; sumT += r.total;
      return '<tr class="clickable" data-filter-type="' + filterType + '" data-filter-value="' + escapeHtml(r.label) + '">' +
        '<td>' + escapeHtml(r.label) + '</td><td class="num">' + r.progress + '</td><td class="num">' + r.done + '</td><td class="num">' + r.total + '</td></tr>';
    }).join('');
    body += '<tr class="total-row"><td>합계</td><td class="num">' + sumP + '</td><td class="num">' + sumD + '</td><td class="num">' + sumT + '</td></tr>';
    document.getElementById(tbodyId).innerHTML = body || '<tr><td colspan="4" class="empty">데이터 없음</td></tr>';
    bindFilterableRows(tbodyId);
  }

  function renderPart(){
    renderAggPanel('partBody', aggregateGeneric(state.issues, '__part', CLASSIFY_RULES.part.order), 'part');
  }

  function renderConnType(){
    renderAggPanel('connTypeBody', aggregateGeneric(state.issues, '__connType', CLASSIFY_RULES.connType.order), 'conntype');
  }

  function bindFilterableRows(tbodyId){
    var tbody = document.getElementById(tbodyId);
    if (!tbody) return;
    tbody.querySelectorAll('tr[data-filter-type]').forEach(function(tr){
      tr.addEventListener('click', function(){
        setFilter(tr.getAttribute('data-filter-type'), tr.getAttribute('data-filter-value'));
      });
    });
  }

  function renderChart(){
    var tl = state.summary.timeline;
    var ctx = document.getElementById('trendChart').getContext('2d');
    var labels = tl.map(function(x){ return x.date; });
    var cumIssue = tl.map(function(x){ return x.cumIssue; });
    var cumDone = tl.map(function(x){ return x.cumDone; });

    if (chart) chart.destroy();
    chart = new Chart(ctx, {
      type: 'line',
      data: {
        labels: labels,
        datasets: [
          { label: '누적 이슈', data: cumIssue, borderColor: '#5b9dff', backgroundColor: 'rgba(91,157,255,0.08)', tension: 0.25, fill: true, pointRadius: 2 },
          { label: '누적 해결', data: cumDone, borderColor: '#34d399', backgroundColor: 'rgba(52,211,153,0.08)', tension: 0.25, fill: true, pointRadius: 2 }
        ]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        interaction: { mode: 'index', intersect: false },
        plugins: {
          legend: {
            labels: { color: '#93a1b3', font: { size: 13, weight: '600' }, boxWidth: 14, padding: 12 }
          },
          tooltip: {
            titleFont: { size: 15, weight: '700' },
            bodyFont: { size: 13.5 },
            padding: 10,
            titleMarginBottom: 6,
            callbacks: {
              afterBody: function(items){
                if (!items || !items.length) return '';
                var idx = items[0].dataIndex;
                var day = tl[idx];
                return ['', '이 날 신규: ' + day.newCount + '건', '이 날 해결: ' + day.doneCount + '건'];
              }
            }
          }
        },
        scales: {
          x: { ticks: { color: '#ffffff', font: { size: 12 } }, grid: { color: 'rgba(255,255,255,0.04)' } },
          y: { ticks: { color: '#5b6b80', font: { size: 12 } }, grid: { color: 'rgba(255,255,255,0.04)' } }
        }
      }
    });
  }

  function setFilter(type, value){
    var isSame = state.filter && state.filter.type === type && state.filter.value === value;
    state.filter = isSame ? null : { type: type, value: value };

    var chip = document.getElementById('filterChip');
    var labelMap = { assignee: '담당자', tracker: '분류', status: '상태', priority: '우선순위', part: '파트', conntype: '접속유형', feature: '기능', env: '환경' };
    var quickLabelMap = { notdone: '미처리', done: '처리완료', all: '전체 이슈' };
    if (state.filter && state.filter.type === 'quick'){
      if (state.filter.value === 'all'){
        // 전체 이슈는 필터를 거는 게 아니라 그냥 전부 보여주는 것이므로, 칩은 숨김
        state.filter = null;
        chip.classList.remove('active');
      } else {
        chip.classList.add('active');
        document.getElementById('filterLabel').textContent = quickLabelMap[value] + ' 이슈만 보는 중';
      }
    } else if (state.filter){
      chip.classList.add('active');
      document.getElementById('filterLabel').textContent =
        labelMap[state.filter.type] + ' "' + state.filter.value + '" 이슈만 보는 중';
    } else {
      chip.classList.remove('active');
    }
    renderIssues();

    // 최상단으로 이동 (페이지 스크롤 + 이슈 목록 내부 스크롤 모두 초기화)
    window.scrollTo({ top: 0, behavior: 'smooth' });
    var scrollBox = document.querySelector('.issues-table-scroll');
    if (scrollBox) scrollBox.scrollTop = 0;
  }

  function renderIssues(){
    var list = state.issues;
    var f = state.filter;
    if (f){
      if (f.type === 'assignee'){
        list = list.filter(function(it){ return it.담당자 === f.value; });
      } else if (f.type === 'tracker'){
        list = list.filter(function(it){ return it.분류 === f.value; });
      } else if (f.type === 'status'){
        list = list.filter(function(it){ return (it.상태 || '').indexOf(f.value) !== -1; });
      } else if (f.type === 'priority'){
        list = list.filter(function(it){ return (it.우선순위 || '').indexOf(f.value) !== -1; });
      } else if (f.type === 'part'){
        list = list.filter(function(it){ return it.__part === f.value; });
      } else if (f.type === 'conntype'){
        list = list.filter(function(it){ return it.__connType === f.value; });
      } else if (f.type === 'feature'){
        list = list.filter(function(it){ return it.__feature === f.value; });
      } else if (f.type === 'env'){
        list = list.filter(function(it){ return it.__env === f.value; });
      } else if (f.type === 'quick'){
        if (f.value === 'notdone') list = list.filter(function(it){ return isNotDoneStatus(it.상태); });
        else if (f.value === 'done') list = list.filter(function(it){ return !isNotDoneStatus(it.상태); });
      }
    }
    document.getElementById('issueCount').textContent = list.length;

    var rows = list.map(function(it, idx){
      var notDone = isNotDoneStatus(it.상태);
      return '<tr>' +
        '<td>' + (idx + 1) + '</td>' +
        '<td><a class="issue-link" href="' + escapeHtml(it.link) + '" target="_blank" rel="noopener">#' + escapeHtml(it.일감번호) + '</a></td>' +
        '<td>' + escapeHtml(it.분류) + '</td>' +
        '<td><span class="status-badge ' + (notDone ? 'notdone' : 'done') + '">' + escapeHtml(it.상태) + '</span></td>' +
        '<td class="title-cell"><a class="title-link" href="' + escapeHtml(it.link) + '" target="_blank" rel="noopener">' + escapeHtml(it.제목) + '</a></td>' +
        '<td>' + escapeHtml(it.우선순위) + '</td>' +
        '<td>' + escapeHtml(it.담당자) + '</td>' +
        '<td>' + fmtTime(it.created_on) + '</td>' +
      '</tr>';
    }).join('');
    document.getElementById('issuesBody').innerHTML = rows || '<tr><td colspan="8" class="empty">해당 조건의 이슈가 없습니다</td></tr>';
  }

  document.getElementById('filterChip').addEventListener('click', function(){
    if (state.filter) setFilter(state.filter.type, state.filter.value); // 같은 값으로 다시 호출하면 토글되어 해제됨
  });

  loadData();
</script>
</body>
</html>
