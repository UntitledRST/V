<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>RC8 일감 현황</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<style>
  :root{
    --bg: #0a0e14;
    --panel-bg: #10161f;
    --panel-border: #1e2733;
    --card-bg: #131a24;
    --text-primary: #eef2f7;
    --text-secondary: #93a1b3;
    --text-tertiary: #5b6b80;
    --blue: #5b9dff;
    --purple: #c084fc;
    --green: #34d399;
    --yellow: #fbbf24;
    --red: #ef4444;
    --orange: #fb923c;
    --radius-lg: 14px;
    --radius-md: 10px;
    --mono: 'JetBrains Mono', ui-monospace, 'SF Mono', Menlo, monospace;
    --sans: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Pretendard, sans-serif;
  }
  *{ box-sizing:border-box; }
  html, body{
    margin:0; padding:0; background:var(--bg); color:var(--text-primary);
    font-family:var(--sans); -webkit-font-smoothing:antialiased;
    overflow-x:hidden;
  }
  .wrap{
    width:100%; margin:0; padding:24px 32px 40px;
  }

  #errorBox:empty{ display:none; }
  .last-updated{ margin:0 0 12px; font-size:15px; color:var(--text-secondary); }
  .last-updated span{ color:var(--green); font-family:var(--mono); }
  .last-updated{ margin:0 0 14px; font-size:14px; color:var(--text-secondary); }
  .last-updated span{ color:var(--green); font-family:var(--mono); }

  /* ---- 메인 영역: 자연스러운 세로 흐름 (필요하면 페이지 자체가 스크롤됨) ---- */
  .main-grid{
    display:flex; flex-direction:column; gap:14px;
  }

  /* 상단: 통계 카드 4개 한 줄 */
  .stat-row{
    display:grid; grid-template-columns: repeat(5, 1fr); gap:14px;
  }
  .stat-card{
    background:var(--card-bg); border:1px solid var(--panel-border); border-radius:var(--radius-md);
    padding:16px 18px; display:flex; flex-direction:column; justify-content:center;
  }
  .stat-card.clickable{ cursor:pointer; transition: transform .12s ease, border-color .12s ease; }
  .stat-card.clickable:hover{ transform: translateY(-2px); border-color: var(--blue); }
  .stat-card .label{ font-size:16px; color:var(--text-secondary); margin-bottom:6px; }
  .stat-card .value{ font-size:46px; font-weight:800; font-family:var(--mono); }
  .stat-card.notdone .value{ color:var(--yellow); }
  .stat-card.done .value{ color:var(--green); }
  .stat-card.rate .value{ color:var(--blue); }
  .stat-card.dup .value{ color:var(--purple); }

  .stat-card.split-card{ flex-direction:row; align-items:stretch; gap:12px; }
  .total-main{ display:flex; flex-direction:column; justify-content:center; cursor:pointer; flex:1 1 0; min-width:0; }
  .total-severity-list{ display:flex; flex-direction:column; gap:4px; justify-content:center; flex:1 1 0; min-width:0; }
  .total-severity-item{
    border:1px solid var(--panel-border); border-radius:8px; padding:4px 10px;
    font-size:12.5px; font-weight:700; text-align:center; cursor:pointer;
    background:rgba(255,255,255,0.03); transition: border-color .12s ease, transform .12s ease;
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  }
  .total-severity-item:hover{ border-color:var(--blue); transform:translateY(-1px); }
  .stat-card.notdone .total-severity-item{ color:var(--yellow); }

  .dup-badge{
    display:inline-block; background:rgba(239,68,68,0.16); color:var(--red);
    font-size:12px; font-weight:800; padding:2px 7px; border-radius:999px;
    margin-right:6px; vertical-align:middle; white-space:nowrap;
  }
  .dup-list{ margin-top:4px; padding-left:2px; display:flex; flex-direction:column; gap:2px; }
  .dup-item{
    font-size:12.5px; color:var(--text-tertiary); text-decoration:none;
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:100%; display:block;
  }
  .dup-item:hover{ color:var(--blue); text-decoration:underline; }
  .dup-item::before{ content:"↳ "; color:var(--red); }

  /* 중단: 전체 이슈 목록, 전체 폭 (내용이 많을 수 있으니 내부 스크롤 유지) */
  .issues-panel{
    display:flex; flex-direction:column;
  }
  .issues-panel .issues-table-scroll{ max-height:42vh; overflow:auto; }

  /* 요약 패널 4개: 한 줄에 나란히, 스크롤 없이 전체 표시 */
  .panels{
    display:grid; grid-template-columns: repeat(4, 1fr); gap:14px;
  }
  .panels .panel{ display:flex; flex-direction:column; overflow:visible; }

  /* 누적 차트: 전체 폭 + 큰 높이로 추세가 잘 보이도록 */
  .chart-panel{ display:flex; flex-direction:column; }
  .chart-wrap{ position:relative; height:340px; }

  .chart-tooltip{
    position:absolute; z-index:20; pointer-events:auto;
    background:#161b26; border:1px solid rgba(255,255,255,0.1); border-radius:10px;
    padding:8px; font-size:13px; color:#e6e9ef; opacity:0; transition:opacity 0.1s ease;
    transform:translate(-50%, -110%); box-shadow:0 8px 24px rgba(0,0,0,0.4); min-width:150px;
  }
  .chart-tooltip-title{ font-weight:700; font-size:13.5px; padding:2px 6px 6px; color:#fff; }
  .chart-tooltip-row{
    display:flex; justify-content:space-between; gap:14px; padding:6px 8px; border-radius:6px; cursor:pointer;
  }
  .chart-tooltip-row:hover{ background:rgba(91,157,255,0.16); }
  .chart-tooltip-row .chart-tooltip-value{ color:#93a1b3; font-weight:600; }
  .chart-tooltip-row:hover .chart-tooltip-value{ color:#fff; }

  @media (max-width: 1100px){
    .panels{ grid-template-columns: repeat(2, 1fr); }
  }

  @media (max-width: 900px){
    .wrap{ padding:16px 14px 32px; }
    .stat-row{ grid-template-columns: repeat(2, 1fr); gap:10px; }
    .stat-card{ min-height:64px; padding:12px 14px; }
    .stat-card .label{ font-size:18px; }
    .stat-card .value{ font-size:38px; }
    .panel{ padding:14px 14px; }
    .panel h2{ font-size:22px; margin-bottom:10px; }
    table{ font-size:17px; }
    th{ font-size:14px; padding:5px 6px; }
    td{ padding:9px 8px; }
    .pill{ font-size:15px; padding:4px 10px; }
    .status-badge{ font-size:14px; padding:4px 8px; }
    .filter-chip{ font-size:15px; padding:6px 12px; }
    .empty, .loading, .error-box{ font-size:16px; }

    .issues-panel .issues-table-scroll{ max-height:340px; }
    .panels{ grid-template-columns: 1fr; gap:10px; }
    .chart-wrap{ height:300px; }

    /* 표 내용이 화면보다 넓으면 잘리지 않고 옆으로 스크롤되도록 함 */
    .panel{ overflow-x:auto; }
    .title-cell{ max-width:340px; }
  }

  @media (max-width: 480px){
    .stat-row{ grid-template-columns: 1fr 1fr; }
    .stat-card .value{ font-size:32px; }
    table{ font-size:15px; }
    th{ font-size:12.5px; }
    .title-cell{ max-width:260px; }
    .chart-wrap{ height:260px; }
  }

  .panel{
    background:var(--panel-bg); border:1px solid var(--panel-border); border-radius:var(--radius-lg);
    padding:14px 16px;
  }
  .panel h2{ margin:0 0 12px; font-size:20px; font-weight:800; letter-spacing:0.01em; flex:0 0 auto; }
  .panel h2.c-blue{ color:var(--blue); }
  .panel h2.c-purple{ color:var(--purple); }
  .panel h2.c-orange{ color:var(--orange); }
  .panel h2.c-green{ color:var(--green); }

  table{ width:100%; border-collapse:collapse; font-size:15px; }
  th{ text-align:left; color:var(--text-secondary); font-weight:600; font-size:13px; text-transform:uppercase; letter-spacing:0.03em; padding:6px 8px; border-bottom:1px solid var(--panel-border); }
  td{ padding:8px 9px; border-bottom:1px solid rgba(255,255,255,0.04); }
  tr.total-row td{ font-weight:800; color:var(--text-primary); border-top:1px solid var(--panel-border); }
  tr.clickable{ cursor:pointer; }
  tr.clickable:hover td{ background:rgba(91,157,255,0.07); }
  .pill{ display:inline-block; padding:3px 11px; border-radius:999px; font-size:14px; font-weight:700; }
  .pill.done{ background:rgba(52,211,153,0.15); color:var(--green); }
  .pill.notdone{ background:rgba(251,191,36,0.15); color:var(--yellow); }
  .mono{ font-family:var(--mono); }
  .num{ text-align:right; font-family:var(--mono); }

  .issues-panel h2{ display:flex; align-items:center; justify-content:space-between; }

  .today-summary-panel{ display:flex; flex-direction:column; gap:12px; }
  .today-summary-grid{ display:grid; grid-template-columns: repeat(2, 1fr); gap:14px; }
  .today-summary-item{
    background:var(--card-bg); border:1px solid var(--panel-border); border-radius:var(--radius-md);
    padding:14px 18px; cursor:pointer; transition: transform .12s ease, border-color .12s ease;
  }
  .today-summary-item:hover{ transform: translateY(-2px); border-color: var(--blue); }
  .today-summary-item .label{ font-size:15px; color:var(--text-secondary); margin-bottom:6px; }
  .today-summary-item .value{ font-size:32px; font-weight:800; font-family:var(--mono); color:var(--blue); }
  #todayDoneCard .value{ color:var(--green); }
  .today-severity-row{ display:flex; flex-wrap:wrap; gap:8px; }
  .today-severity-chip{
    background:rgba(255,255,255,0.05); border:1px solid var(--panel-border); border-radius:999px;
    padding:6px 14px; font-size:14px; font-weight:700;
  }
  .today-severity-chip.clickable{ cursor:pointer; transition: transform .12s ease, border-color .12s ease; }
  .today-severity-chip.clickable:hover{ transform: translateY(-2px); border-color: var(--blue); }

  .search-bar{ display:flex; justify-content:center; align-items:center; gap:8px; margin:4px 0 14px; }
  .search-input{
    width:100%; max-width:420px; background:var(--panel-bg); border:1px solid var(--panel-border);
    border-radius:999px; padding:9px 16px; color:var(--text-primary); font-size:14.5px; font-family:inherit;
    outline:none; transition:border-color .12s ease;
  }
  .search-input:focus{ border-color:var(--blue); }
  .search-input::placeholder{ color:var(--text-tertiary); }
  .search-btn{
    background:rgba(91,157,255,0.16); color:var(--blue); border:1px solid rgba(91,157,255,0.35);
    border-radius:999px; padding:9px 18px;
    font-size:14.5px; font-weight:700; cursor:pointer; font-family:inherit; white-space:nowrap;
  }
  .search-btn:hover{ background:rgba(91,157,255,0.28); }
  .filter-chip{
    display:none; align-items:center; gap:6px; background:rgba(91,157,255,0.14); color:var(--blue);
    font-size:14.5px; font-weight:700; padding:5px 12px; border-radius:999px; cursor:pointer;
  }
  .filter-chip.active{ display:inline-flex; }
  .filter-chip .x{ font-weight:900; }

  .hidden-nav-btn{
    position:fixed; top:0; right:0; width:64px; height:64px; z-index:999;
    background:transparent; border:none; padding:0; margin:0; cursor:pointer;
  }

  .issues-table-scroll{ overflow:auto; }
  .issues-table-scroll table{ font-size:16px; }
  .issues-table-scroll th{ position:sticky; top:0; background:var(--panel-bg); }
  .status-badge{ font-size:13px; font-weight:700; padding:3px 9px; border-radius:6px; white-space:nowrap; }
  .status-badge.notdone{ background:rgba(251,191,36,0.15); color:var(--yellow); }
  .status-badge.done{ background:rgba(255,255,255,0.06); color:var(--text-tertiary); }
  a.issue-link{ color:var(--blue); text-decoration:none; font-family:var(--mono); }
  a.issue-link:hover{ text-decoration:underline; }
  .title-cell{ max-width:900px; }
  a.title-link{ color:var(--text-primary); text-decoration:none; }
  a.title-link:hover{ color:var(--blue); text-decoration:underline; }

  .empty, .loading{ color:var(--text-tertiary); font-size:15px; padding:20px 0; text-align:center; }
  .error-box{
    background:rgba(239,68,68,0.1); border:1px solid rgba(239,68,68,0.3); color:#fca5a5;
    padding:10px 14px; border-radius:var(--radius-md); font-size:15px; margin-bottom:10px;
  }
</style>
</head>
<body>
<button id="hiddenNavBtn" class="hidden-nav-btn" type="button" aria-hidden="true" tabindex="-1"></button>
<div class="wrap">

  <p id="lastUpdated" class="last-updated">불러오는 중&hellip;</p>

  <p id="lastUpdated" class="last-updated"></p>

  <div id="errorBox"></div>

  <div class="main-grid">

  <div class="stat-row" id="statRow">
    <div class="stat-card notdone split-card">
      <div class="total-main clickable" data-filter-type="quick" data-filter-value="notdone">
        <div class="label">미처리</div>
        <div class="value">&mdash;</div>
      </div>
      <div class="total-severity-list">
        <div class="total-severity-item clickable" data-filter-type="quick" data-filter-value="notdone_high">우선순위 높음 <span id="notdoneHighValue">&mdash;</span>건</div>
      </div>
    </div>
    <div class="stat-card done clickable" data-filter-type="quick" data-filter-value="done"><div class="label">처리완료</div><div class="value">&mdash;</div></div>
    <div class="stat-card total split-card">
      <div class="total-main clickable" data-filter-type="quick" data-filter-value="all">
        <div class="label">전체 이슈</div>
        <div class="value">&mdash;</div>
      </div>
      <div class="total-severity-list" id="totalSeverityList"></div>
    </div>
    <div class="stat-card rate"><div class="label">처리율</div><div class="value">&mdash;</div></div>
    <div class="stat-card dup clickable" data-filter-type="quick" data-filter-value="duplicate"><div class="label">중복</div><div class="value">&mdash;</div></div>
  </div>

  <div class="panel today-summary-panel">
    <h2 class="c-blue">오늘의 요약 (<span id="todayDate">&mdash;</span>)</h2>
    <div class="today-summary-grid">
      <div class="today-summary-item clickable" id="todayNewCard">
        <div class="label">오늘 등록</div>
        <div class="value" id="todayNewCount">&mdash;</div>
      </div>
      <div class="today-summary-item clickable" id="todayDoneCard">
        <div class="label">오늘 해결</div>
        <div class="value" id="todayDoneCount">&mdash;</div>
      </div>
    </div>
    <div class="today-severity-row" id="todaySeverityRow"></div>
  </div>

  <div class="panel issues-panel">
    <h2>
      <span>전체 이슈 목록 (<span id="issueCount">0</span>건)</span>
      <span class="filter-chip" id="filterChip"><span id="filterLabel"></span><span class="x">&times;</span></span>
    </h2>
    <div class="search-bar">
      <input type="text" id="issueSearchInput" class="search-input" placeholder="제목·일감번호·담당자·분류 등으로 검색">
      <button type="button" id="issueSearchBtn" class="search-btn">검색</button>
    </div>
    <div class="issues-table-scroll">
      <table>
        <thead>
          <tr>
            <th style="width:44px">번호</th>
            <th style="width:80px">일감번호</th>
            <th>분류</th>
            <th>상태</th>
            <th>제목</th>
            <th>우선순위</th>
            <th>담당자</th>
            <th>작성시간</th>
          </tr>
        </thead>
        <tbody id="issuesBody"><tr><td colspan="8" class="loading">불러오는 중&hellip;</td></tr></tbody>
      </table>
    </div>
  </div>

  <div class="panels">
    <div class="panel">
      <h2 class="c-blue">담당자별 집계</h2>
      <table>
        <thead><tr><th>담당자</th><th>완료여부</th><th>할당/처리</th><th style="text-align:right">처리율</th></tr></thead>
        <tbody id="assigneeBody"><tr><td colspan="4" class="loading">불러오는 중&hellip;</td></tr></tbody>
      </table>
    </div>

    <div class="panel">
      <h2 class="c-orange">상태별 집계</h2>
      <table>
        <thead><tr><th>상태</th><th style="text-align:right">개수</th></tr></thead>
        <tbody id="statusBody"><tr><td colspan="2" class="loading">불러오는 중&hellip;</td></tr></tbody>
      </table>
    </div>

    <div class="panel">
      <h2 class="c-blue">파트별 집계</h2>
      <table>
        <thead><tr><th>파트</th><th style="text-align:right">진행중</th><th style="text-align:right">완료됨</th><th style="text-align:right">합계</th></tr></thead>
        <tbody id="partBody"><tr><td colspan="4" class="loading">불러오는 중&hellip;</td></tr></tbody>
      </table>
    </div>

    <div class="panel">
      <h2 class="c-purple">접속유형별 집계</h2>
      <table>
        <thead><tr><th>접속유형</th><th style="text-align:right">진행중</th><th style="text-align:right">완료됨</th><th style="text-align:right">합계</th></tr></thead>
        <tbody id="connTypeBody"><tr><td colspan="4" class="loading">불러오는 중&hellip;</td></tr></tbody>
      </table>
    </div>
  </div>

  <div class="panel chart-panel">
    <h2 class="c-blue">누적 이슈 / 해결 추이</h2>
    <div class="chart-wrap"><canvas id="trendChart"></canvas></div>
  </div>

  </div>
</div>

<script>
  var state = { issues: [], summary: null, filter: { type: null, value: null }, searchText: '' };
  var chart = null;

  function escapeHtml(s){
    return String(s == null ? '' : s).replace(/[&<>"']/g, function(c){
      return { '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;' }[c];
    });
  }

  function fmtTime(t){
    if (!t) return '<span style="color:var(--text-tertiary)">&mdash;</span>';
    var parts = t.split(' ');
    return escapeHtml(parts[0]) + '<br><span style="color:#ffffff;font-size:14px;font-weight:600">' + escapeHtml(parts[1] || '') + '</span>';
  }

  function isNotDoneStatus(s){
    return ['신규','진행','피드백'].some(function(k){ return (s||'').indexOf(k) !== -1; });
  }

  // "우선순위 높음" = 치명적(Critical/Blocker) 또는 중대함(Major/High) 등급
  // ====== 우선순위 4단계 판정 ======
  // 1. 치명적 (Critical/Blocker)  2. 중대함 (Major/High)  3. 경미함 (Minor/Medium)  4. 낮음 (Low/Trivial/Cosmetic)
  function isCriticalPriority(p){
    return ['치명적', 'critical', 'blocker'].some(function(k){
      return (p || '').toLowerCase().indexOf(k.toLowerCase()) !== -1;
    });
  }
  function isMajorPriority(p){
    return ['중대', 'major', 'high', '높음', '긴급'].some(function(k){
      return (p || '').toLowerCase().indexOf(k.toLowerCase()) !== -1;
    });
  }
  function isMinorPriority(p){
    return ['경미', 'minor', 'medium', '보통'].some(function(k){
      return (p || '').toLowerCase().indexOf(k.toLowerCase()) !== -1;
    });
  }
  function isLowPriority(p){
    return ['낮음', 'low', 'trivial', 'cosmetic'].some(function(k){
      return (p || '').toLowerCase().indexOf(k.toLowerCase()) !== -1;
    });
  }
  // "우선순위 높음" = 치명적 또는 중대함 등급 (기존 스탯카드/필터에서 계속 사용)
  function isHighPriority(p){
    return isCriticalPriority(p) || isMajorPriority(p);
  }

  var PRIORITY_TIERS = [
    { label: '치명적', test: isCriticalPriority, color: 'var(--red)' },
    { label: '중대함', test: isMajorPriority, color: 'var(--orange)' },
    { label: '경미함', test: isMinorPriority, color: 'var(--yellow)' },
    { label: '낮음', test: isLowPriority, color: 'var(--text-tertiary)' }
  ];

  // ====== 파트/접속유형/기능/환경 분류 규칙 ======
  // 실제 데이터(API)에는 이 4가지가 별도 필드로 없어서, 제목(및 제목 속 [대괄호] 태그)에서
  // 아래 키워드를 찾아 자동 분류합니다. 실데이터로 확인 후 안 맞으면 이 키워드 목록만 수정하면 됩니다.
  var CLASSIFY_RULES = {
    part: {
      order: ['기획', '디자인', '개발'],

      // "UI 사용성/정렬/그림자/개행" 같은 표현이 있으면 디자인, 그 외엔 기본적으로 개발(기능 버그)로 간주

        '여부 확인 필요', '여부 검토', '기획 확인', '기획요청', '기획 불일치',

    feature: {

      buckets: [
        { label: '접속/연결/로그인', keywords: ['접속', '연결', '로그인', 'login', '로그아웃', '세션', '중계', 'vp', '재연결', '대기', 'welcome', '입장', '네트워크', '버전', '업데이트', '실행 실패', '초기화', '모듈'] },
        { label: '화면공유/모니터', keywords: ['화면 공유', '화면공유', '모니터', 'pip', '화면 조절', '화면조절', '전체 화면', '전체화면', '화질', '디스플레이', '해상도', '축소', '확대', '화면 미표시', '화면 전환', '미니맵', '회색', '카메라', '마이크'] },
        { label: '파일전송/공유함', keywords: ['파일 전송', '파일전송', '공유함', '파일함', '업로드', '다운로드', '첨부'] },
        { label: '그리기/원격제어', keywords: ['그리기', '원격 제어', '원격제어', '포인터', '커서', '오브젝트', '스티커', '특수키', '마우스', '텍스트'] },

  function parseTags(title){
    var tags = [];
    var re = /\[([^\[\]]+)\]/g;
    var m;
    while ((m = re.exec(title || '')) !== null){
      tags.push(m[1].trim());
    }
    return tags;
  }

  function hasIStartWord(text){
    // '아이폰'/'아이패드'(iOS 관련 단어) 또는 'i'로 시작하는 영문 단어(iOS/iPhone 등)가 있는지 확인
    // (단순히 '아이'로 시작하는지만 보면 '아이콘' 같은 무관한 단어까지 걸려서, 정확히 '아이폰/아이패드' 단어인지 확인)
    var tokens = String(text || '').split(/[\s\[\]\(\)\u2014\-:,./]+/);
    return tokens.some(function(tok){
      if (!tok) return false;
      if (tok.indexOf('아이폰') !== -1 || tok.indexOf('아이패드') !== -1) return true;
      return /^i/i.test(tok);
    });
  }

  function matchesKeywordList(text, list){
    if (!text) return false;
    var lower = String(text).toLowerCase();
    return list.some(function(k){ return lower.indexOf(String(k).toLowerCase()) !== -1; });
  }

  function matchCategoryFromText(text, keywordMap, checkOrder){
    if (!text) return null;
    var lower = String(text).toLowerCase();
    var keys = checkOrder || Object.keys(keywordMap);
    for (var i = 0; i < keys.length; i++){
      var label = keys[i];
      var kws = keywordMap[label] || [];
      for (var j = 0; j < kws.length; j++){
        if (lower.indexOf(String(kws[j]).toLowerCase()) !== -1) return label;
      }
    }
    return null;
  }

  // 제목 유사도 기반 중복 판정
  // 1) 맨 앞 [프로젝트/버전] 태그 제거 + 소문자화 + 기호 제거 후 단어 단위로 쪼갠 뒤
  // 2) 두 제목의 단어 집합 간 자카드 유사도(겹치는 단어 비율)를 계산해서 임계값 이상이면 "유사 중복"으로 표시
  var DUP_SIMILARITY_THRESHOLD = 0.6; // 0~1, 높을수록 더 엄격하게(거의 똑같아야) 중복으로 판정

  function tokenizeForSimilarity(title){
    var t = (title || '');
    t = t.replace(/^\s*\[[^\]]*\]\s*/, ''); // 맨 앞 프로젝트/버전 태그 제거
    t = t.toLowerCase();
    t = t.replace(/[\[\]\(\)\u2014\-·,.:;!?"'/\\]+/g, ' ');
    return t.split(/\s+/).filter(Boolean);
  }

  function jaccardSimilarity(tokensA, tokensB){
    if (!tokensA.length || !tokensB.length) return 0;
    var setB = {};
    tokensB.forEach(function(t){ setB[t] = true; });
    var unionSet = {};
    tokensA.forEach(function(t){ unionSet[t] = true; });
    tokensB.forEach(function(t){ unionSet[t] = true; });
    var intersectionCount = 0;
    tokensA.forEach(function(t){ if (setB[t]) intersectionCount++; });
    var unionCount = Object.keys(unionSet).length;
    return unionCount === 0 ? 0 : intersectionCount / unionCount;
  }

  function markDuplicateIssues(issues){
    var tokenSets = issues.map(function(it){ return tokenizeForSimilarity(it.제목); });
    var matchIdx = issues.map(function(){ return []; }); // 각 이슈별로 유사 중복으로 잡힌 다른 이슈의 인덱스 목록

    for (var i = 0; i < issues.length; i++){
      if (!tokenSets[i].length) continue;
      for (var j = i + 1; j < issues.length; j++){
        if (!tokenSets[j].length) continue;
        var sim = jaccardSimilarity(tokenSets[i], tokenSets[j]);
        if (sim >= DUP_SIMILARITY_THRESHOLD){
          matchIdx[i].push(j);
          matchIdx[j].push(i);
        }
      }
    }

    issues.forEach(function(it, idx){
      it.__dupMatches = matchIdx[idx].map(function(j){
        return { 일감번호: issues[j].일감번호, 제목: issues[j].제목, link: issues[j].link };
      });
      it.__dupCount = it.__dupMatches.length + 1; // 자기 자신 포함
      it.__isDuplicate = it.__dupMatches.length > 0;
    });
  }

  function classifyIssues(issues){
    issues.forEach(function(it){
      var allTags = parseTags(it.제목);
      // 제목의 맨 앞 [대괄호]는 "[SaaS_8.0.1_QA]" 같은 프로젝트/버전 태그라서 분류 대상에서 항상 제외
      var tags = allTags.slice(1);
      var tagText = tags.join(' ');
      var title = it.제목 || '';

      // 파트: 대괄호 태그가 아니라 문장 전체 내용(표현)을 보고 기획/디자인/개발을 판단
      // ("기획(Figma)와 불일치" 같은 참고 문구가 워낙 많아, 단순 "기획" 단어 매칭은 오분류를 유발하기 쉬움)
      if (matchesKeywordList(title, CLASSIFY_RULES.part.planningKeywords)) {
        it.__part = '기획';
      } else if (matchesKeywordList(title, CLASSIFY_RULES.part.designKeywords)) {
        it.__part = '디자인';
      } else {
        it.__part = '개발';
      }

      // 접속유형/환경: 대괄호 태그를 먼저 보고, 태그에서 못 찾으면 본문 전체에서 찾음
      // (Mac Host, windows app viewer 처럼 대괄호 없이 본문에만 쓰인 경우 대응)
      it.__connType =
        matchCategoryFromText(tagText, CLASSIFY_RULES.connType.keywords, CLASSIFY_RULES.connType.checkOrder) ||
        matchCategoryFromText(title, CLASSIFY_RULES.connType.keywords, CLASSIFY_RULES.connType.checkOrder) ||
        '기타';

      // '뷰어 응용'은 별도 항목을 없애고 '뷰어'로 통합
      if (it.__connType === '뷰어 응용') {
        it.__connType = '뷰어';
      }
      // 접속유형 신호가 전혀 없는 이슈는, 내용을 보고 가장 가까운 곳으로 배정
      // (중계 페이지·특정 호스트 기기 모델명 → 호스트, 파트너/어드민/네트워크 설정 → 에이전트, 그 외엔 가장 흔한 '뷰어' 기본값)
      if (it.__connType === '기타') {
        if (matchesKeywordList(title, ['중계', 'm1', 'm4'])) {
          it.__connType = '호스트';
        } else if (matchesKeywordList(title, ['어드민', '파트너', '네트워크 그룹'])) {
          it.__connType = '에이전트';
        } else {
          it.__connType = '뷰어';
        }
      }
      it.__env =
        matchCategoryFromText(tagText, CLASSIFY_RULES.env.keywords) ||
        matchCategoryFromText(title, CLASSIFY_RULES.env.keywords) ||
        '기타';

      // '모바일 호스트' 이슈인데 환경이 아직 '기타'라면, iOS 관련 단어(아이-, i-)가 없는 경우 Android로 기본 배정
      if (it.__env === '기타' && title.indexOf('모바일') !== -1 && !hasIStartWord(title)) {
        it.__env = 'Android';
      }

      // 기능: 제목 전체 내용을 보고 5개 상위 기능 영역 중 하나로 분류 (우선순위 순서대로 먼저 맞는 것)
      it.__feature = classifyFeatureBucket(title);
    });
  }

  function classifyFeatureBucket(title){
    var buckets = CLASSIFY_RULES.feature.buckets;
    for (var i = 0; i < buckets.length; i++){
      if (matchesKeywordList(title, buckets[i].keywords)) return buckets[i].label;
    }
    return '기타';
  }

  // 이슈 목록을 지정한 필드(keyField) 기준으로 진행중/완료됨/합계 집계
  // order가 있으면 그 순서대로(마지막 '기타'는 미지정 항목까지 합산), 없으면 합계 내림차순('기타'는 항상 마지막)
  function aggregateGeneric(list, keyField, order){
    var map = {};
    list.forEach(function(it){
      var key = it[keyField] || '기타';
      if (!map[key]) map[key] = { label: key, progress: 0, done: 0, total: 0 };
      map[key].total++;
      if (isNotDoneStatus(it.상태)) map[key].progress++; else map[key].done++;
    });

    if (order){
      var known = order.filter(function(k){ return k !== '기타'; });
      var rows = known.map(function(k){
        return map[k] || { label: k, progress: 0, done: 0, total: 0 };
      });
      if (order.indexOf('기타') !== -1){
        var etc = { label: '기타', progress: 0, done: 0, total: 0 };
        Object.keys(map).forEach(function(k){
          if (known.indexOf(k) === -1){
            etc.progress += map[k].progress;
            etc.done += map[k].done;
            etc.total += map[k].total;
          }
        });
        rows.push(etc);
      }
      return rows;
    }

    var keys = Object.keys(map).filter(function(k){ return k !== '기타'; });
    keys.sort(function(a, b){ return map[b].total - map[a].total; });
    var rows2 = keys.map(function(k){ return map[k]; });
    if (map['기타']) rows2.push(map['기타']);
    return rows2;
  }

  async function loadData(){
    document.getElementById('errorBox').innerHTML = '';

    try {
      var res = await fetch('/api/issues');
      var data = await res.json();
      if (!data.ok) throw new Error(data.error || '알 수 없는 오류');

      state.issues = data.issues;
      state.summary = data.summary;
      classifyIssues(state.issues);
      markDuplicateIssues(state.issues);

      renderAll();

      var d = new Date(data.fetchedAt);
      document.getElementById('lastUpdated').innerHTML =
        '마지막 업데이트: <span>' + d.toLocaleString('ko-KR') + '</span> · 총 ' + data.count + '건';
    } catch (err) {
      document.getElementById('errorBox').innerHTML =
        '<div class="error-box">데이터를 불러오지 못했습니다: ' + escapeHtml(err.message || err) + '</div>';
    }
  }

  function renderAll(){
    renderStats();
    renderAssignees();
    renderStatuses();
    renderPart();
    renderConnType();
    renderTodaySummary();
    renderChart();
    renderIssues();
  }

  function renderTodaySummary(){
    var tl = state.summary.timeline;
    if (!tl || !tl.length) return;
    var today = tl[tl.length - 1]; // 타임라인의 마지막 날짜를 '오늘'로 간주

    document.getElementById('todayDate').textContent = today.date;
    document.getElementById('todayNewCount').textContent = today.newCount;
    document.getElementById('todayDoneCount').textContent = today.doneCount;

    var todaysNewIssues = state.issues.filter(function(it){
      return (it.created_on || '').split(' ')[0] === today.date;
    });

    var severityHtml = PRIORITY_TIERS.map(function(tier){
      var count = todaysNewIssues.filter(function(it){ return tier.test(it.우선순위); }).length;
      return '<div class="today-severity-chip clickable" data-tier="' + escapeHtml(tier.label) + '" style="color:' + tier.color + '">' + tier.label + ' ' + count + '건</div>';
    }).join('');
    document.getElementById('todaySeverityRow').innerHTML =
      severityHtml || '<div class="today-severity-chip">오늘 등록된 이슈가 없습니다</div>';

    document.querySelectorAll('#todaySeverityRow .today-severity-chip[data-tier]').forEach(function(chip){
      chip.addEventListener('click', function(){
        setSeverityFilter(today.date, chip.getAttribute('data-tier'));
      });
    });

    document.getElementById('todayNewCard').onclick = function(){ setDayFilter(today.date, 'newCount'); };
    document.getElementById('todayDoneCard').onclick = function(){ setDayFilter(today.date, 'doneCount'); };
  }

  function renderStats(){
    var c = state.summary.completion;
    var rate = c.total === 0 ? 0 : Math.round((c.done / c.total) * 100);
    var cards = document.querySelectorAll('.stat-card .value');
    cards[0].textContent = c.notDone;   // 미처리 (NN)
    cards[1].textContent = c.done;      // 처리완료
    cards[2].textContent = c.total;     // 전체 이슈
    cards[3].textContent = rate + '%';  // 처리율
    cards[4].textContent = state.issues.filter(function(it){ return it.__isDuplicate; }).length; // 중복

    // 미처리 카드 안의 "우선순위 높음 nn건" (미처리이면서 우선순위 높은 것만)
    document.getElementById('notdoneHighValue').textContent = state.issues.filter(function(it){
      return isNotDoneStatus(it.상태) && isHighPriority(it.우선순위);
    }).length;

    // 전체 이슈 카드 안의 치명적/중대함/경미함/낮음 세부 목록 (전체 이슈 기준, 날짜 무관)
    var severityHtml = PRIORITY_TIERS.map(function(tier){
      var count = state.issues.filter(function(it){ return tier.test(it.우선순위); }).length;
      return '<div class="total-severity-item" data-tier="' + escapeHtml(tier.label) + '" style="color:' + tier.color + '">' + tier.label + ' ' + count + '건</div>';
    }).join('');
    document.getElementById('totalSeverityList').innerHTML = severityHtml;
    document.querySelectorAll('#totalSeverityList .total-severity-item').forEach(function(item){
      item.addEventListener('click', function(){
        setPriorityTierFilter(item.getAttribute('data-tier'));
      });
    });

    document.querySelectorAll('#statRow [data-filter-type]').forEach(function(card){
      card.onclick = function(){
        setFilter(card.getAttribute('data-filter-type'), card.getAttribute('data-filter-value'));
      };
    });
  }

  function renderAssignees(){
    var sorted = state.summary.assignees.slice().sort(function(a, b){ return b.total - a.total; });
    var rows = sorted.map(function(a){
      return '<tr class="clickable" data-filter-type="assignee" data-filter-value="' + escapeHtml(a.name) + '">' +
        '<td>' + escapeHtml(a.name) + '</td>' +
        '<td><span class="pill ' + (a.complete ? 'done' : 'notdone') + '">' + (a.complete ? '완료' : '미완료') + '</span></td>' +
        '<td class="mono">' + a.total + '/' + a.done + '</td>' +
        '<td class="num">' + a.rate + '%</td>' +
      '</tr>';
    }).join('');
    document.getElementById('assigneeBody').innerHTML = rows || '<tr><td colspan="4" class="empty">데이터 없음</td></tr>';
    bindFilterableRows('assigneeBody');
  }

  function renderStatuses(){
    var s = state.summary.statuses;
    var sum = 0;
    var rows = s.map(function(x){
      sum += x.count;
      return '<tr class="clickable" data-filter-type="status" data-filter-value="' + escapeHtml(x.label) + '">' +
        '<td>' + escapeHtml(x.label) + '</td><td class="num">' + x.count + '</td></tr>';
    }).join('');
    rows += '<tr class="total-row"><td>합계</td><td class="num">' + sum + '</td></tr>';
    document.getElementById('statusBody').innerHTML = rows;
    bindFilterableRows('statusBody');
  }

  function renderAggPanel(tbodyId, rows, filterType){
    var sumP = 0, sumD = 0, sumT = 0;
    var body = rows.map(function(r){
      sumP += r.progress; sumD += r.done; sumT += r.total;
      return '<tr class="clickable" data-filter-type="' + filterType + '" data-filter-value="' + escapeHtml(r.label) + '">' +
        '<td>' + escapeHtml(r.label) + '</td><td class="num">' + r.progress + '</td><td class="num">' + r.done + '</td><td class="num">' + r.total + '</td></tr>';
    }).join('');
    body += '<tr class="total-row"><td>합계</td><td class="num">' + sumP + '</td><td class="num">' + sumD + '</td><td class="num">' + sumT + '</td></tr>';
    document.getElementById(tbodyId).innerHTML = body || '<tr><td colspan="4" class="empty">데이터 없음</td></tr>';
    bindFilterableRows(tbodyId);
  }

  function renderPart(){
    renderAggPanel('partBody', aggregateGeneric(state.issues, '__part', CLASSIFY_RULES.part.order), 'part');
  }

  function renderConnType(){
    renderAggPanel('connTypeBody', aggregateGeneric(state.issues, '__connType', CLASSIFY_RULES.connType.order), 'conntype');
  }

  function bindFilterableRows(tbodyId){
    var tbody = document.getElementById(tbodyId);
    if (!tbody) return;
    tbody.querySelectorAll('tr[data-filter-type]').forEach(function(tr){
      tr.addEventListener('click', function(){
        setFilter(tr.getAttribute('data-filter-type'), tr.getAttribute('data-filter-value'));
      });
    });
  }

  function renderChart(){
    var tl = state.summary.timeline;
    var ctx = document.getElementById('trendChart').getContext('2d');
    var labels = tl.map(function(x){ return x.date; });
    var cumIssue = tl.map(function(x){ return x.cumIssue; });
    var cumDone = tl.map(function(x){ return x.cumDone; });

    if (chart) chart.destroy();
    chart = new Chart(ctx, {
      type: 'line',
      data: {
        labels: labels,
        datasets: [
          { label: '누적 이슈', data: cumIssue, borderColor: '#5b9dff', backgroundColor: 'rgba(91,157,255,0.08)', tension: 0.25, fill: true, pointRadius: 2 },
          { label: '누적 해결', data: cumDone, borderColor: '#34d399', backgroundColor: 'rgba(52,211,153,0.08)', tension: 0.25, fill: true, pointRadius: 2 }
        ]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        interaction: { mode: 'index', intersect: false },
        plugins: {
          legend: {
            labels: { color: '#93a1b3', font: { size: 13, weight: '600' }, boxWidth: 14, padding: 12 }
          },
          tooltip: {
            enabled: false,
            external: chartTooltipHandler
          }
        },
        scales: {
          x: { ticks: { color: '#ffffff', font: { size: 12 } }, grid: { color: 'rgba(255,255,255,0.04)' } },
          y: { ticks: { color: '#5b6b80', font: { size: 12 } }, grid: { color: 'rgba(255,255,255,0.04)' } }
        }
      }
    });
  }

  // 차트 위에 보이는 커스텀 클릭 가능 툴팁: 누적 이슈/누적 해결/이 날 신규/이 날 해결 각 줄을 클릭하면
  // 해당 일자 기준으로 전체 이슈 목록을 필터링하고 최상단으로 이동
  var DAY_KIND_LABEL = { cumIssue: '누적 이슈', cumDone: '누적 해결', newCount: '이 날 신규', doneCount: '이 날 해결' };

  var chartTooltipState = { overTooltip: false };

  function chartTooltipHandler(context){
    var wrap = document.querySelector('.chart-wrap');
    var tooltipEl = document.getElementById('chartTooltip');
    if (!tooltipEl){
      tooltipEl = document.createElement('div');
      tooltipEl.id = 'chartTooltip';
      tooltipEl.className = 'chart-tooltip';
      wrap.appendChild(tooltipEl);
      // 툴팁 위에 마우스가 올라가 있는 동안은 안 꺼지도록, 벗어나면 바로 꺼지도록 상태 추적
      tooltipEl.addEventListener('mouseenter', function(){
        chartTooltipState.overTooltip = true;
      });
      tooltipEl.addEventListener('mouseleave', function(){
        chartTooltipState.overTooltip = false;
        tooltipEl.style.opacity = 0;
      });
    }

    var tooltipModel = context.tooltip;
    if (!tooltipModel || tooltipModel.opacity === 0){
      if (!chartTooltipState.overTooltip){
        tooltipEl.style.opacity = 0;
      }
      return;
    }

    var idx = (tooltipModel.dataPoints && tooltipModel.dataPoints.length) ? tooltipModel.dataPoints[0].dataIndex : null;
    if (idx === null) { if (!chartTooltipState.overTooltip) tooltipEl.style.opacity = 0; return; }
    var day = state.summary.timeline[idx];
    if (!day) { if (!chartTooltipState.overTooltip) tooltipEl.style.opacity = 0; return; }

    var rows = [
      { kind: 'cumIssue', value: day.cumIssue },
      { kind: 'cumDone', value: day.cumDone },
      { kind: 'newCount', value: day.newCount },
      { kind: 'doneCount', value: day.doneCount }
    ];

    var html = '<div class="chart-tooltip-title">' + escapeHtml(day.date) + '</div>';
    html += rows.map(function(r){
      return '<div class="chart-tooltip-row" data-day-kind="' + r.kind + '" data-day-date="' + escapeHtml(day.date) + '">' +
        '<span>' + DAY_KIND_LABEL[r.kind] + '</span><span class="chart-tooltip-value">' + r.value + '건</span></div>';
    }).join('');
    tooltipEl.innerHTML = html;

    tooltipEl.style.opacity = 1;
    tooltipEl.style.left = tooltipModel.caretX + 'px';
    tooltipEl.style.top = tooltipModel.caretY + 'px';

    tooltipEl.querySelectorAll('.chart-tooltip-row').forEach(function(row){
      row.addEventListener('click', function(){
        setDayFilter(row.getAttribute('data-day-date'), row.getAttribute('data-day-kind'));
      });
    });
  }

  function setDayFilter(date, kind){
    var isSame = state.filter && state.filter.type === 'day' && state.filter.date === date && state.filter.kind === kind;
    state.filter = isSame ? null : { type: 'day', date: date, kind: kind };

    var chip = document.getElementById('filterChip');
    if (state.filter){
      chip.classList.add('active');
      document.getElementById('filterLabel').textContent =
        state.filter.date + ' 기준 ' + DAY_KIND_LABEL[state.filter.kind] + ' 이슈만 보는 중';
    } else {
      chip.classList.remove('active');
    }
    renderIssues();

    window.scrollTo({ top: 0, behavior: 'smooth' });
    var scrollBox = document.querySelector('.issues-table-scroll');
    if (scrollBox) scrollBox.scrollTop = 0;
  }

  function setPriorityTierFilter(tier){
    var isSame = state.filter && state.filter.type === 'priorityTier' && state.filter.tier === tier;
    state.filter = isSame ? null : { type: 'priorityTier', tier: tier };

    var chip = document.getElementById('filterChip');
    if (state.filter){
      chip.classList.add('active');
      document.getElementById('filterLabel').textContent = state.filter.tier + ' 이슈만 보는 중';
    } else {
      chip.classList.remove('active');
    }
    renderIssues();

    window.scrollTo({ top: 0, behavior: 'smooth' });
    var scrollBox3 = document.querySelector('.issues-table-scroll');
    if (scrollBox3) scrollBox3.scrollTop = 0;
  }

  function setSeverityFilter(date, tier){
    var isSame = state.filter && state.filter.type === 'severity' && state.filter.date === date && state.filter.tier === tier;
    state.filter = isSame ? null : { type: 'severity', date: date, tier: tier };

    var chip = document.getElementById('filterChip');
    if (state.filter){
      chip.classList.add('active');
      document.getElementById('filterLabel').textContent =
        state.filter.date + ' 등록 · ' + state.filter.tier + ' 이슈만 보는 중';
    } else {
      chip.classList.remove('active');
    }
    renderIssues();

    window.scrollTo({ top: 0, behavior: 'smooth' });
    var scrollBox2 = document.querySelector('.issues-table-scroll');
    if (scrollBox2) scrollBox2.scrollTop = 0;
  }


  function setFilter(type, value){
    var isSame = state.filter && state.filter.type === type && state.filter.value === value;
    state.filter = isSame ? null : { type: type, value: value };

    var chip = document.getElementById('filterChip');
    var labelMap = { assignee: '담당자', tracker: '분류', status: '상태', priority: '우선순위', part: '파트', conntype: '접속유형', feature: '기능', env: '환경' };
    var quickLabelMap = { notdone: '미처리', done: '처리완료', all: '전체 이슈', notdone_high: '미처리·우선순위 높음', duplicate: '중복' };
    if (state.filter && state.filter.type === 'quick'){
      if (state.filter.value === 'all'){
        // 전체 이슈는 필터를 거는 게 아니라 그냥 전부 보여주는 것이므로, 칩은 숨김
        state.filter = null;
        chip.classList.remove('active');
      } else {
        chip.classList.add('active');
        document.getElementById('filterLabel').textContent = quickLabelMap[value] + ' 이슈만 보는 중';
      }
    } else if (state.filter){
      chip.classList.add('active');
      document.getElementById('filterLabel').textContent =
        labelMap[state.filter.type] + ' "' + state.filter.value + '" 이슈만 보는 중';
    } else {
      chip.classList.remove('active');
    }
    renderIssues();

    // 최상단으로 이동 (페이지 스크롤 + 이슈 목록 내부 스크롤 모두 초기화)
    window.scrollTo({ top: 0, behavior: 'smooth' });
    var scrollBox = document.querySelector('.issues-table-scroll');
    if (scrollBox) scrollBox.scrollTop = 0;
  }

  function renderIssues(){
    var list = state.issues;
    var f = state.filter;
    if (f){
      if (f.type === 'assignee'){
        list = list.filter(function(it){ return it.담당자 === f.value; });
      } else if (f.type === 'tracker'){
        list = list.filter(function(it){ return it.분류 === f.value; });
      } else if (f.type === 'status'){
        list = list.filter(function(it){ return (it.상태 || '').indexOf(f.value) !== -1; });
      } else if (f.type === 'priority'){
        list = list.filter(function(it){ return (it.우선순위 || '').indexOf(f.value) !== -1; });
      } else if (f.type === 'part'){
        list = list.filter(function(it){ return it.__part === f.value; });
      } else if (f.type === 'conntype'){
        list = list.filter(function(it){ return it.__connType === f.value; });
      } else if (f.type === 'feature'){
        list = list.filter(function(it){ return it.__feature === f.value; });
      } else if (f.type === 'env'){
        list = list.filter(function(it){ return it.__env === f.value; });
      } else if (f.type === 'day'){
        // 참고: 이슈 데이터에 '해결(완료)일'이 별도로 없어서, 완료 관련 항목은 작성일 기준으로 근사합니다.
        var issueDateStr = function(it){ return (it.created_on || '').split(' ')[0]; };
        if (f.kind === 'newCount'){
          list = list.filter(function(it){ return issueDateStr(it) === f.date; });
        } else if (f.kind === 'cumIssue'){
          list = list.filter(function(it){ return issueDateStr(it) && issueDateStr(it) <= f.date; });
        } else if (f.kind === 'doneCount'){
          list = list.filter(function(it){ return !isNotDoneStatus(it.상태) && issueDateStr(it) === f.date; });
        } else if (f.kind === 'cumDone'){
          list = list.filter(function(it){ return !isNotDoneStatus(it.상태) && issueDateStr(it) && issueDateStr(it) <= f.date; });
        }
      } else if (f.type === 'severity'){
        var tierObj = PRIORITY_TIERS.filter(function(t){ return t.label === f.tier; })[0];
        list = list.filter(function(it){
          var dateStr = (it.created_on || '').split(' ')[0];
          return dateStr === f.date && tierObj && tierObj.test(it.우선순위);
        });
      } else if (f.type === 'priorityTier'){
        var tierObj2 = PRIORITY_TIERS.filter(function(t){ return t.label === f.tier; })[0];
        list = list.filter(function(it){ return tierObj2 && tierObj2.test(it.우선순위); });
      } else if (f.type === 'quick'){
        if (f.value === 'notdone') list = list.filter(function(it){ return isNotDoneStatus(it.상태); });
        else if (f.value === 'done') list = list.filter(function(it){ return !isNotDoneStatus(it.상태); });
        else if (f.value === 'notdone_high') list = list.filter(function(it){ return isNotDoneStatus(it.상태) && isHighPriority(it.우선순위); });
        else if (f.value === 'duplicate') list = list.filter(function(it){ return it.__isDuplicate; });
      }
    }

    var q = (state.searchText || '').trim().toLowerCase();
    if (q){
      list = list.filter(function(it){
        var haystack = [it.제목, it.일감번호, it.담당자, it.분류, it.우선순위, it.상태]
          .map(function(v){ return (v || '').toString().toLowerCase(); })
          .join(' ');
        return haystack.indexOf(q) !== -1;
      });
    }
    document.getElementById('issueCount').textContent = list.length;

    var rows = list.map(function(it, idx){
      var notDone = isNotDoneStatus(it.상태);
      return '<tr>' +
        '<td>' + (idx + 1) + '</td>' +
        '<td><a class="issue-link" href="' + escapeHtml(it.link) + '" target="_blank" rel="noopener">#' + escapeHtml(it.일감번호) + '</a></td>' +
        '<td>' + escapeHtml(it.분류) + '</td>' +
        '<td><span class="status-badge ' + (notDone ? 'notdone' : 'done') + '">' + escapeHtml(it.상태) + '</span></td>' +
        '<td class="title-cell">' +
          (it.__isDuplicate ? '<span class="dup-badge" title="제목이 유사한 이슈가 ' + it.__dupCount + '건 있습니다">중복 ' + it.__dupCount + '</span>' : '') +
          '<a class="title-link" href="' + escapeHtml(it.link) + '" target="_blank" rel="noopener">' + escapeHtml(it.제목) + '</a>' +
          (it.__isDuplicate ? '<div class="dup-list">' + it.__dupMatches.map(function(m){
            return '<a class="dup-item" href="' + escapeHtml(m.link) + '" target="_blank" rel="noopener">#' + escapeHtml(m.일감번호) + ' ' + escapeHtml(m.제목) + '</a>';
          }).join('') + '</div>' : '') +
        '</td>' +
        '<td>' + escapeHtml(it.우선순위) + '</td>' +
        '<td>' + escapeHtml(it.담당자) + '</td>' +
        '<td>' + fmtTime(it.created_on) + '</td>' +
      '</tr>';
    }).join('');
    document.getElementById('issuesBody').innerHTML = rows || '<tr><td colspan="8" class="empty">해당 조건의 이슈가 없습니다</td></tr>';
  }

  document.getElementById('filterChip').addEventListener('click', function(){
    if (!state.filter) return;
    if (state.filter.type === 'day') {
      setDayFilter(state.filter.date, state.filter.kind); // 같은 값으로 다시 호출하면 토글되어 해제됨
    } else if (state.filter.type === 'severity') {
      setSeverityFilter(state.filter.date, state.filter.tier); // 같은 값으로 다시 호출하면 토글되어 해제됨
    } else if (state.filter.type === 'priorityTier') {
      setPriorityTierFilter(state.filter.tier); // 같은 값으로 다시 호출하면 토글되어 해제됨
    } else {
      setFilter(state.filter.type, state.filter.value); // 같은 값으로 다시 호출하면 토글되어 해제됨
    }
  });

  document.getElementById('hiddenNavBtn').addEventListener('click', function(){
    window.location.href = 'https://rc-version-check.vercel.app/';
  });

  function runIssueSearch(){
    state.searchText = document.getElementById('issueSearchInput').value;
    renderIssues();
  }
  document.getElementById('issueSearchBtn').addEventListener('click', runIssueSearch);
  document.getElementById('issueSearchInput').addEventListener('keydown', function(e){
    if (e.key === 'Enter') runIssueSearch();
  });

  loadData();
</script>
</body>
</html>
